<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>APILADORES - RepoSYSTEM</title>
    <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700&family=Barlow:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg: #0b0f18;
            --card: #131926;
            --linde-red: #e30613;
            --blue: #3b82f6;
            --green: #22c55e;
            --red: #ef4444;
            --orange: #f97316;
            --txt: #e8eaf0;
            --txt-dim: #8896b0;
            --border: #1e2d45;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            font-family: 'Barlow', sans-serif;
            background-color: var(--bg);
            color: var(--txt);
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        header {
            background: linear-gradient(180deg, #090e1a, #111827);
            padding: 15px;
            text-align: center;
            border-bottom: 3px solid var(--linde-red);
        }
        header h1 {
            font-family: 'Barlow Condensed', sans-serif;
            margin: 0;
            color: var(--txt);
            letter-spacing: 2px;
            font-size: 22px;
        }
        header span { color: var(--linde-red); }

        .content { padding: 10px; max-width: 900px; margin: 0 auto; flex: 1; width: 100%; }
        
        .grid-operadores {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-top: 15px;
        }
        .op-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 10px;
            overflow: visible;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            flex-direction: column;
            position: relative;
        }
        .op-card:active { transform: scale(0.95); background: #1a2234; }
        
        .badge-tareas {
            position: absolute;
            top: -5px;
            right: -5px;
            background: var(--linde-red);
            color: white;
            font-size: 12px;
            font-weight: bold;
            width: 22px;
            height: 22px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.5);
            z-index: 10;
            border: 2px solid var(--bg);
        }
        .badge-tareas.zero { display: none; }

        .op-img-container {
            width: 100%;
            height: 80px;
            background: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 5px;
            border-radius: 10px 10px 0 0;
        }
        .op-img-container img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }
        .op-info {
            padding: 8px 4px;
            text-align: center;
        }
        .op-name { font-weight: bold; font-size: 11px; display: block; color: var(--txt); line-height: 1.1; }
        .op-sub { font-size: 9px; color: var(--linde-red); text-transform: uppercase; font-weight: bold; margin-bottom: 2px; display: block; }

        .card {
            background: var(--card);
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 15px;
            border: 1px solid var(--border);
        }
        .info-row { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid var(--border); }
        .info-label { color: var(--linde-red); font-size: 10px; font-weight: bold; text-transform: uppercase; }
        .info-value { font-weight: 600; font-size: 14px; text-align: right; }
        
        .btn {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            margin-top: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            font-size: 14px;
            transition: 0.3s;
        }
        .btn-blue { background: var(--blue); color: white; }
        .btn-green { background: var(--green); color: white; }
        .btn-red { background: var(--red); color: white; }
        .btn-orange { background: var(--orange); color: white; }
        .btn:disabled { opacity: 0.8; cursor: not-allowed; }

        .fa-gear.spinning {
            animation: fa-spin 2s infinite linear;
            font-size: 18px;
        }

        /* Firma del Diseñador */
        .firma-autor {
            text-align: center;
            margin-top: 15px;
            font-size: 12px;
            color: var(--txt-dim);
            letter-spacing: 1px;
            padding: 10px 0;
        }
        .firma-autor strong {
            color: var(--linde-red);
            font-weight: 600;
        }

        .status-msg {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            padding: 10px 20px;
            border-radius: 50px;
            font-weight: bold;
            display: none;
            z-index: 1000;
            font-size: 13px;
        }
        .hidden { display: none; }
    </style>
</head>
<body>

<header>
    <h1>REPO<span>SYSTEM</span> APILADORES</h1>
</header>

<div class="content">
    <!-- SECCIÓN SELECCIÓN OPERADOR -->
    <div id="secSeleccion">
        <h3 style="text-align: center; color: var(--txt-dim); margin-top: 10px; font-size: 13px; letter-spacing: 1px;">¿QUIÉN ERES?</h3>
        <div class="grid-operadores">
            <div class="op-card" onclick="seleccionarOperador('Francisco Vigueras')">
                <div id="badge-Francisco" class="badge-tareas zero">0</div>
                <div class="op-img-container"><img src="https://raw.githubusercontent.com/ralay2341/reposicion-alm9037/main/linde_l12.png" onerror="this.src='https://img.icons8.com/fluency/96/fork-lift.png'"></div>
                <div class="op-info"><span class="op-sub">Apilador 1</span><span class="op-name">Francisco Vigueras</span></div>
            </div>
            <div class="op-card" onclick="seleccionarOperador('Diego Nahuelcheo')">
                <div id="badge-Diego" class="badge-tareas zero">0</div>
                <div class="op-img-container"><img src="https://raw.githubusercontent.com/ralay2341/reposicion-alm9037/main/linde_l12.png" onerror="this.src='https://img.icons8.com/fluency/96/fork-lift.png'"></div>
                <div class="op-info"><span class="op-sub">Apilador 2</span><span class="op-name">Diego Nahuelcheo</span></div>
            </div>
            <div class="op-card" onclick="seleccionarOperador('Gonzalo Díaz')">
                <div id="badge-Gonzalo" class="badge-tareas zero">0</div>
                <div class="op-img-container"><img src="https://raw.githubusercontent.com/ralay2341/reposicion-alm9037/main/linde_l12.png" onerror="this.src='https://img.icons8.com/fluency/96/fork-lift.png'"></div>
                <div class="op-info"><span class="op-sub">Apilador 3</span><span class="op-name">Gonzalo Díaz</span></div>
            </div>
            <div class="op-card" onclick="seleccionarOperador('Jorge González')">
                <div id="badge-Jorge" class="badge-tareas zero">0</div>
                <div class="op-img-container"><img src="https://raw.githubusercontent.com/ralay2341/reposicion-alm9037/main/linde_l12.png" onerror="this.src='https://img.icons8.com/fluency/96/fork-lift.png'"></div>
                <div class="op-info"><span class="op-sub">Apilador 4</span><span class="op-name">Jorge González</span></div>
            </div>
            <div class="op-card" onclick="seleccionarOperador('Jim San')">
                <div id="badge-Jim" class="badge-tareas zero">0</div>
                <div class="op-img-container"><img src="https://raw.githubusercontent.com/ralay2341/reposicion-alm9037/main/linde_l12.png" onerror="this.src='https://img.icons8.com/fluency/96/fork-lift.png'"></div>
                <div class="op-info"><span class="op-sub">Apilador 5</span><span class="op-name">Jim San</span></div>
            </div>
            <div class="op-card" onclick="seleccionarOperador('Grúa Apoyo')">
                <div id="badge-Grúa" class="badge-tareas zero">0</div>
                <div class="op-img-container"><img src="https://raw.githubusercontent.com/ralay2341/reposicion-alm9037/main/linde_l12.png" onerror="this.src='https://img.icons8.com/fluency/96/fork-lift.png'"></div>
                <div class="op-info"><span class="op-sub">Apilador 6</span><span class="op-name">Grúa Apoyo</span></div>
            </div>
        </div>
        <button id="btnActualizar" class="btn btn-blue" onclick="obtenerContadores()">
            <i id="iconoBtn" class="fa-solid fa-arrows-rotate"></i>
            <span id="textoBtn">Actualizar Contadores</span>
        </button>
        <!-- FIRMA EN MENÚ PRINCIPAL -->
        <div class="firma-autor">Diseñado por: <strong>Raul Layseca</strong></div>
    </div>

    <!-- SECCIÓN TAREAS -->
    <div id="secTareas" class="hidden">
        <div class="card">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
                <h3 id="tituloOperador" style="margin:0; color: var(--linde-red); font-size: 13px;">TAREAS</h3>
                <span id="contador" style="font-size: 11px; color: var(--txt-dim);">0 / 0</span>
            </div>
            <div id="tareaContenido">
                <p style="text-align: center; color: var(--txt-dim); padding: 10px;">Buscando tareas...</p>
            </div>
            <button class="btn" style="background: transparent; border: 1px solid var(--border); color: var(--txt-dim); padding: 10px; font-size: 12px;" onclick="volverASeleccion()">← Volver al Menú</button>
        </div>

        <div id="controlesApilador" class="hidden">
            <div class="card" style="text-align: center; padding: 10px;">
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                    <button class="btn btn-green" style="margin-top:0;" onclick="enviarResultado('REALIZADO')">REALIZADO</button>
                    <button class="btn btn-red" style="margin-top:0;" onclick="enviarResultado('UBIC. VACÍA')">VACÍA</button>
                </div>
                <button class="btn btn-orange" onclick="enviarResultado('NO CORRESPONDE')">NO CORRESPONDE</button>
                <!-- FIRMA EN MENÚ DE TAREAS -->
                <div class="firma-autor">Diseñado por: <strong>Raul Layseca</strong></div>
            </div>
        </div>
    </div>
</div>

<div id="mensajeGlobal" class="status-msg"></div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwTU_4vSFf0MOoQrfceGnYTkkIxLd2ewbUWR9rIOHoZ_nXfeWN8Uti5Nu-Za3sEDLlpRQ/exec"; 
    
    let todasLasTareas = [];
    let tareasFiltradas = [];
    let indexActual = 0;
    let nombreOperador = "";

    window.onload = obtenerContadores;

    async function obtenerContadores() {
        const btn = document.getElementById('btnActualizar');
        const icono = document.getElementById('iconoBtn');
        const texto = document.getElementById('textoBtn');
        
        btn.disabled = true;
        icono.className = "fa-solid fa-gear spinning";
        texto.innerText = 'PROCESANDO...';
        btn.style.backgroundColor = "#1e293b";

        try {
            const resp = await fetch(`${SCRIPT_URL}?action=getTareas`);
            const data = await resp.json();
            if (data.tareas) {
                todasLasTareas = data.tareas;
                const operadores = ['Francisco', 'Diego', 'Gonzalo', 'Jorge', 'Jim', 'Grúa'];
                
                operadores.forEach(op => {
                    const cant = todasLasTareas.filter(t => t.operador.toLowerCase().includes(op.toLowerCase())).length;
                    const badge = document.getElementById(`badge-${op}`);
                    if (badge) {
                        badge.innerText = cant;
                        badge.classList.toggle('zero', cant === 0);
                    }
                });
            }
        } catch (err) { 
            console.error("Error contadores:", err); 
        } finally {
            btn.disabled = false;
            icono.className = "fa-solid fa-arrows-rotate";
            texto.innerText = 'ACTUALIZAR CONTADORES';
            btn.style.backgroundColor = "var(--blue)";
        }
    }

    function seleccionarOperador(nombre) {
        nombreOperador = nombre;
        document.getElementById('tituloOperador').innerText = `OPERADOR: ${nombre.toUpperCase()}`;
        document.getElementById('secSeleccion').classList.add('hidden');
        document.getElementById('secTareas').classList.remove('hidden');
        cargarTareas();
    }

    function volverASeleccion() {
        nombreOperador = "";
        document.getElementById('secTareas').classList.add('hidden');
        document.getElementById('secSeleccion').classList.remove('hidden');
        obtenerContadores();
    }

    function mostrarMensaje(texto, tipo) {
        const m = document.getElementById('mensajeGlobal');
        m.innerText = texto;
        m.style.display = 'block';
        m.style.backgroundColor = tipo === 'error' ? 'var(--red)' : tipo === 'success' ? 'var(--green)' : 'var(--blue)';
        setTimeout(() => m.style.display = 'none', 3000);
    }

    async function cargarTareas() {
        document.getElementById('tareaContenido').innerHTML = "<p style='text-align:center;'>Buscando tus tareas...</p>";
        try {
            const resp = await fetch(`${SCRIPT_URL}?action=getTareas`);
            const data = await resp.json();
            if (data.tareas) {
                todasLasTareas = data.tareas;
                tareasFiltradas = todasLasTareas.filter(t => 
                    t.operador.toLowerCase().includes(nombreOperador.split(' ')[0].toLowerCase())
                );

                if (tareasFiltradas.length > 0) {
                    indexActual = 0;
                    mostrarTarea();
                    document.getElementById('controlesApilador').classList.remove('hidden');
                } else {
                    document.getElementById('tareaContenido').innerHTML = `<p style='text-align:center; color:var(--txt-dim); padding:20px;'>No tienes tareas pendientes, ${nombreOperador.split(' ')[0]}.</p>`;
                    document.getElementById('controlesApilador').classList.add('hidden');
                    document.getElementById('contador').innerText = "0 / 0";
                }
            }
        } catch (err) { mostrarMensaje("Error de conexión", "error"); }
    }

    function mostrarTarea() {
        const t = tareasFiltradas[indexActual];
        document.getElementById('contador').innerText = `${indexActual + 1} / ${tareasFiltradas.length}`;
        document.getElementById('tareaContenido').innerHTML = `
            <div class="info-row"><span class="info-label">Origen</span><span class="info-value" style="color:#f0a500;">${t.ubic_origen}</span></div>
            <div class="info-row"><span class="info-label">SAP</span><span class="info-value">${t.sap}</span></div>
            <div class="info-row"><span class="info-label">Descripción</span><span class="info-value" style="font-size:12px;">${t.descripcion}</span></div>
            <div class="info-row"><span class="info-label">Cant / Lote</span><span class="info-value">${t.cantidad} (${t.lote})</span></div>
            <div class="info-row"><span class="info-label">Destino</span><span class="info-value" style="color:var(--green);">${t.ubic_destino}</span></div>
        `;
    }

    async function enviarResultado(resultado) {
        const t = tareasFiltradas[indexActual];
        const now = new Date();
        const payload = {
            action: 'registrarResultado',
            folio: t.folio,
            ubic_origen: t.ubic_origen,
            sap: t.sap,
            operador: nombreOperador,
            resultado: resultado,
            fecha: now.toLocaleDateString('es-CL'),
            hora: now.toLocaleTimeString('es-CL')
        };

        mostrarMensaje("Grabando...", "info");
        try {
            await fetch(SCRIPT_URL, {
                method: 'POST',
                mode: 'no-cors',
                headers: { 'Content-Type': 'text/plain' },
                body: JSON.stringify(payload)
            });
            mostrarMensaje("✅ Grabado", "success");
            setTimeout(() => {
                indexActual++;
                if (indexActual < tareasFiltradas.length) mostrarTarea();
                else {
                    document.getElementById('tareaContenido').innerHTML = "<p style='text-align:center; color:var(--green);'>¡Completado!</p>";
                    document.getElementById('controlesApilador').classList.add('hidden');
                }
            }, 800);
        } catch (err) { mostrarMensaje("Error al grabar", "error"); }
    }
</script>
</body>
</html>
