<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LOGÍSTICA DASHBOARD — RepoSYSTEM</title>
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    :root {
      --bg: #070b12; --surface: #0d1420; --card: #111827;
      --red: #e30613; --blue: #3b82f6; --green: #10b981;
      --amber: #f59e0b; --purple: #8b5cf6; --txt: #e2e8f0;
      --txt-dim: #64748b; --border: #1e2d45;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--txt); min-height: 100vh; overflow-x: hidden; }
    header { background: #0a0f1c; border-bottom: 2px solid var(--red); padding: 15px 25px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; }
    header h1 { font-family: 'Rajdhani', sans-serif; font-size: 20px; letter-spacing: 2px; }
    header h1 span { color: var(--red); }
    .header-right { text-align: right; display: flex; flex-direction: column; align-items: flex-end; }
    .btn-update { background: var(--red); color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-family: 'Rajdhani'; font-weight: bold; display: flex; align-items: center; gap: 8px; }
    .designer-tag { font-size: 10px; color: var(--txt-dim); margin-top: 5px; font-family: 'Rajdhani'; letter-spacing: 1px; text-transform: uppercase; }
    .wrapper { display: flex; gap: 20px; padding: 20px; max-width: 1600px; margin: 0 auto; align-items: flex-start; }
    .sidebar { width: 300px; flex-shrink: 0; display: flex; flex-direction: column; gap: 20px; }
    .main-content { flex-grow: 1; min-width: 0; }
    .kpi-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; margin-bottom: 20px; }
    .kpi { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 15px; border-top: 4px solid var(--red); }
    .kpi-val { font-family: 'Rajdhani', sans-serif; font-size: 28px; font-weight: 700; }
    .kpi-label { font-size: 10px; color: var(--txt-dim); text-transform: uppercase; letter-spacing: 1px; }
    .card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 20px; }
    .card-title { font-family: 'Rajdhani', sans-serif; font-size: 14px; color: var(--txt-dim); text-transform: uppercase; border-bottom: 1px solid var(--border); padding-bottom: 10px; margin-bottom: 15px; }
    .filter-group { display: flex; flex-direction: column; gap: 10px; margin-top: 15px; }
    input[type="date"], select { background: #1a2234; border: 1px solid var(--border); color: var(--txt); padding: 8px; border-radius: 5px; font-size: 12px; }
    .btn-filter { background: var(--blue); color: white; border: none; padding: 8px; border-radius: 5px; font-family: 'Rajdhani'; font-weight: bold; cursor: pointer; }
    #fechaSidebar { font-size: 11px; color: var(--amber); margin-top: 10px; font-weight: bold; }
    .side-panel { position: fixed; right: -450px; top: 0; width: 420px; height: 100%; background: var(--surface); border-left: 3px solid var(--red); z-index: 200; transition: 0.4s; padding: 30px; overflow-y: auto; box-shadow: -10px 0 30px rgba(0,0,0,0.7); }
    .side-panel.open { right: 0; }
    .close-panel { position: absolute; top: 20px; right: 20px; cursor: pointer; font-size: 20px; color: var(--red); font-weight: bold; }
    .panel-kpi-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
    .pkpi { background: #1a2234; padding: 10px; border-radius: 6px; border-left: 3px solid var(--blue); }
    .pkpi small { font-size: 9px; color: var(--txt-dim); text-transform: uppercase; }
    .pkpi div { font-family: 'Rajdhani'; font-size: 18px; font-weight: bold; }
    .prod-list { font-size: 11px; max-height: 250px; overflow-y: auto; }
    .prod-item { display: flex; justify-content: space-between; padding: 5px 0; border-bottom: 1px solid #1a2234; }
    table { width: 100%; border-collapse: collapse; font-size: 11px; }
    th { text-align: left; padding: 10px; color: var(--txt-dim); border-bottom: 1px solid var(--border); }
    td { padding: 10px; border-bottom: 1px solid #1a2234; }
    .badge { padding: 3px 6px; border-radius: 4px; font-weight: bold; font-family: 'Rajdhani'; }
    .green { background: rgba(16,185,129,0.1); color: var(--green); }
    .amber { background: rgba(245,158,11,0.1); color: var(--amber); }
    .red-status { background: rgba(227,6,19,0.1); color: var(--red); }
    .spin { animation: spin 1s linear infinite; display: inline-block; }
    @keyframes spin { 100% { transform: rotate(360deg); } }
    .charts-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 10px; margin-top: 20px; }
    .chart-box { background: rgba(255,255,255,0.02); padding: 10px; border-radius: 8px; text-align: center; }
    canvas { max-width: 100%; height: 120px !important; }
    .hidden { display: none; }
  </style>
</head>
<body>

<div id="sidePanel" class="side-panel">
  <span class="close-panel" onclick="togglePanel()">✕</span>
  <h2 style="font-family: 'Rajdhani'; color: var(--red); margin-bottom: 15px;">ESTADÍSTICA HISTÓRICA (COL O)</h2>
  <div class="panel-kpi-grid" id="panelGeneralStats"></div>
  <div id="filterResult"></div>
</div>

<header>
  <h1>REPOSYSTEM <span>ALM9037</span></h1>
  <div class="header-right">
    <div id="statusMsg" style="font-size: 11px; color: var(--amber); margin-bottom: 2px;" class="hidden">Conectando...</div>
    <button class="btn-update" onclick="cargarDatos()" id="btnUpdate">
      <span id="gearIcon">🔄</span> ACTUALIZAR
    </button>
    <div class="designer-tag">Diseñado Por: Raul Layseca Beas</div>
  </div>
</header>

<div class="wrapper">
  <aside class="sidebar">
    <div class="card">
      <div class="card-title">Consultar Histórico 📅</div>
      <div class="filter-group">
        <input type="date" id="inputDate">
        <select id="inputRange">
          <option value="Día">Día Seleccionado</option>
          <option value="Semana">Semana</option>
          <option value="Mes">Mes</option>
        </select>
        <button class="btn-filter" id="btnFilter" onclick="aplicarFiltro()">GENERAR ESTADÍSTICA</button>
        <div id="fechaSidebar">Consulta: Tiempo Real</div>
      </div>
    </div>
    <div class="card">
      <div class="card-title">Productividad / Hora ⚡</div>
      <div id="prodByHourList" class="prod-list"></div>
    </div>
  </aside>

  <main class="main-content">
    <div class="kpi-row">
      <div class="kpi"><div class="kpi-val" id="kTotal">0</div><div class="kpi-label">Total Reposiciones</div></div>
      <div class="kpi" style="border-top-color: var(--green);"><div class="kpi-val" id="kRealizadas" style="color: var(--green);">0</div><div class="kpi-label">Correctas</div></div>
      <div class="kpi" style="border-top-color: var(--amber);"><div class="kpi-val" id="kVacias" style="color: var(--amber);">0</div><div class="kpi-label">Ubicac. Vacías</div></div>
      <div class="kpi" style="border-top-color: var(--red);"><div class="kpi-val" id="kErrores" style="color: var(--red);">0</div><div class="kpi-label">No Corresponde</div></div>
    </div>
    <div class="card">
      <div class="card-title">Desempeño Individual 📊</div>
      <table>
        <thead>
          <tr>
            <th>Operador</th>
            <th>Total</th>
            <th>OK</th>
            <th>Vacías</th>
            <th>Error</th>
            <th>P/H</th>
            <th>%</th>
          </tr>
        </thead>
        <tbody id="rendBody"></tbody>
      </table>
      <div class="charts-grid" id="chartsContainer"></div>
    </div>
  </main>
</div>

<script>
  const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwTU_4vSFf0MOoQrfceGnYTkkIxLd2ewbUWR9rIOHoZ_nXfeWN8Uti5Nu-Za3sEDLlpRQ/exec"; 
  let chartInstances = [];

  function resetDashboard() {
    document.getElementById('kTotal').textContent = "0";
    document.getElementById('kRealizadas').textContent = "0";
    document.getElementById('kVacias').textContent = "0";
    document.getElementById('kErrores').textContent = "0";
    document.getElementById('rendBody').innerHTML = "";
    document.getElementById('chartsContainer').innerHTML = "";
    document.getElementById('prodByHourList').innerHTML = "";
    document.getElementById('filterResult').innerHTML = "";
    document.getElementById('panelGeneralStats').innerHTML = "";
    chartInstances.forEach(c => c.destroy());
    chartInstances = [];
  }

  async function cargarDatos() {
    toggleLoading(true);
    resetDashboard();
    try {
      const response = await fetch(`${SCRIPT_URL}?action=getReporteDatos`);
      const data = await response.json();
      procesarReporte(data);
    } catch (e) { console.error(e); } 
    finally { toggleLoading(false); }
  }

  async function aplicarFiltro() {
    const rawDate = document.getElementById('inputDate').value;
    if (!rawDate) return alert("Selecciona una fecha");

    // FORMATEO PARA COLUMNA O (Día-Mes-Año)
    const parts = rawDate.split('-');
    const fechaFormateada = `${parts[2]}-${parts[1]}-${parts[0]}`;
    const rango = document.getElementById('inputRange').value;

    toggleLoading(true);
    resetDashboard();

    try {
      const response = await fetch(`${SCRIPT_URL}?action=getReporteDatos&fecha=${fechaFormateada}&rango=${rango}&targetCol=O`);
      const data = await response.json();
      
      if(!data || !data.totalTareas || data.totalTareas == 0) {
        document.getElementById('fechaSidebar').textContent = `SIN DATOS: ${fechaFormateada}`;
        alert(`Sin registros en Columna O para: ${fechaFormateada}`);
      } else {
        document.getElementById('fechaSidebar').textContent = `Consulta: ${fechaFormateada}`;
        mostrarPanelHistorial(data);
        procesarReporte(data);
      }
    } catch (e) { alert("Error de servidor."); } 
    finally { toggleLoading(false); }
  }

  function mostrarPanelHistorial(data) {
    const panel = document.getElementById('sidePanel');
    const pStats = document.getElementById('panelGeneralStats');
    const res = document.getElementById('filterResult');
    
    pStats.innerHTML = `
      <div class="pkpi"><small>Total</small><div>${data.totalTareas}</div></div>
      <div class="pkpi"><small>Eficiencia</small><div style="color:var(--purple)">${Math.round((data.porEstado['REALIZADO'] / data.totalTareas) * 100)}%</div></div>
    `;

    let html = "";
    Object.entries(data.rendimientoIndividual || {}).forEach(([nom, s]) => {
      html += `<div class="card" style="margin-bottom:10px; padding:10px; background:#161f2e;">
                <b style="font-size:12px;">${nom}</b>: ${s.realizados} OK
               </div>`;
    });
    res.innerHTML = html;
    panel.classList.add('open');
  }

  function procesarReporte(data) {
    document.getElementById('kTotal').textContent = data.totalTareas || 0;
    document.getElementById('kRealizadas').textContent = data.porEstado['REALIZADO'] || 0;
    document.getElementById('kVacias').textContent = data.porEstado['UBIC. VACÍA'] || 0;
    document.getElementById('kErrores').textContent = data.porEstado['COD. NO CORRESPONDE'] || 0;

    Object.entries(data.rendimientoIndividual || {}).forEach(([nom, s], i) => {
      document.getElementById('rendBody').innerHTML += `<tr>
        <td><strong>${nom}</strong></td><td>${s.total}</td>
        <td><span class="badge green">${s.realizados}</span></td>
        <td><span class="badge amber">${s.vacias}</span></td>
        <td><span class="badge red-status">${s.nocode}</span></td>
        <td>${s.palletsPorHora}</td>
        <td style="color:var(--green)">${s.cumplimiento}%</td></tr>`;
      
      document.getElementById('prodByHourList').innerHTML += `<div class="prod-item"><span>${nom}</span><b>${s.palletsPorHora} P/H</b></div>`;
      
      const chartId = `c-${i}`;
      document.getElementById('chartsContainer').innerHTML += `<div class="chart-box"><p style="font-size:9px;">${nom}</p><canvas id="${chartId}"></canvas></div>`;
      
      setTimeout(() => {
        const ctx = document.getElementById(chartId).getContext('2d');
        const c = new Chart(ctx, {
          type: 'doughnut',
          data: { datasets: [{ data: [s.realizados, s.vacias, s.nocode], backgroundColor: ['#10b981', '#f59e0b', '#e30613'], borderWidth: 0 }] },
          options: { cutout: '78%', plugins: { legend: { display: false } } }
        });
        chartInstances.push(c);
      }, 0);
    });
  }

  function toggleLoading(s) { 
    document.getElementById('statusMsg').classList.toggle('hidden', !s);
    document.getElementById('gearIcon').classList.toggle('spin', s);
  }
  function togglePanel() { document.getElementById('sidePanel').classList.remove('open'); }
  window.onload = cargarDatos;
</script>
</body>
</html>
