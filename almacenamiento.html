<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Almacenamiento ALM9037 - V2</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@600;700&family=Share+Tech+Mono&family=Exo+2:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #080c14; --surface: #0e1520; --card: #121c2e; --border: #1e3050;
  --gold: #f0a500; --cyan: #00d4ff; --green: #00e676; --red: #ff4444;
  --orange: #ff8c00; --txt: #d0e4ff; --txt2: #6b8aac;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--txt); font-family: 'Exo 2', sans-serif; height: 100vh; overflow: hidden; }

.hdr { background: #0a1020; border-bottom: 2px solid var(--gold); padding: 10px 18px; display: flex; justify-content: space-between; align-items: center; }
.hdr-logo { font-family: 'Rajdhani', sans-serif; font-size: 22px; font-weight: 700; color: var(--gold); letter-spacing: 2px; }
.hdr-clock { font-family: 'Share Tech Mono', monospace; font-size: 18px; color: var(--cyan); }

.screen { position: fixed; inset: 0; padding-top: 60px; display: none; flex-direction: column; overflow-y: auto; }
.screen.on { display: flex; }

/* LANDING */
#s-landing { align-items: center; justify-content: center; padding: 20px; }
.gruero-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; width: 100%; max-width: 400px; }
.gruero-btn { background: var(--card); border: 2px solid var(--border); border-radius: 12px; padding: 20px; text-align: center; cursor: pointer; }
.gruero-btn:active { transform: scale(0.95); }
.gruero-name { font-family: 'Rajdhani', sans-serif; font-weight: 700; margin-top: 8px; }

/* MAIN */
#s-main { padding: 15px; max-width: 500px; margin: 0 auto; width: 100%; }
.user-bar { background: var(--card); padding: 12px; border-radius: 12px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; border: 1px solid var(--border); }
.search-box { background: var(--card); padding: 15px; border-radius: 12px; border: 1px solid var(--border); margin-bottom: 15px; }
.search-input { width: 100%; background: var(--bg); border: 2px solid var(--border); border-radius: 8px; padding: 12px; color: #fff; font-family: 'Share Tech Mono', monospace; font-size: 20px; margin-bottom: 10px; outline: none; }
.search-input:focus { border-color: var(--gold); }
.btn-search { width: 100%; background: var(--cyan); color: #000; border: none; padding: 12px; border-radius: 8px; font-weight: 700; font-family: 'Rajdhani', sans-serif; cursor: pointer; }

.pallet-info { background: var(--card); padding: 15px; border-radius: 12px; border: 1px solid var(--border); margin-bottom: 15px; display: none; }
.info-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #1e3050; }
.info-row:last-child { border-bottom: none; }
.info-k { font-size: 11px; color: var(--txt2); text-transform: uppercase; }
.info-v { font-family: 'Share Tech Mono', monospace; font-size: 15px; }

.action-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; display: none; }
.btn-act { padding: 18px; border-radius: 12px; border: none; font-family: 'Rajdhani', sans-serif; font-weight: 700; font-size: 16px; cursor: pointer; color: #000; }
.btn-realizado { background: var(--green); }
.btn-pendiente { background: var(--orange); }
.btn-act:active { transform: scale(0.95); }

.btn-logout { background: transparent; border: 1px solid var(--red); color: var(--red); padding: 5px 10px; border-radius: 6px; font-size: 11px; cursor: pointer; }

.toast { position: fixed; bottom: 20px; left: 20px; right: 20px; background: #000; border: 1px solid var(--border); padding: 15px; border-radius: 10px; text-align: center; transform: translateY(100px); transition: 0.3s; z-index: 100; }
.toast.on { transform: translateY(0); }
</style>
</head>
<body>

<div class="hdr">
  <div class="hdr-logo">ALM9037</div>
  <div class="hdr-clock" id="clk">00:00:00</div>
</div>

<!-- SELECCIÓN OPERADOR -->
<div class="screen on" id="s-landing">
  <h2 style="margin-bottom:20px; font-family:'Rajdhani'">Seleccionar Operador</h2>
  <div class="gruero-grid" id="gruero-grid"></div>
</div>

<!-- OPERACIÓN -->
<div class="screen" id="s-main-screen">
  <div id="s-main">
    <div class="user-bar">
      <div>
        <div id="user-name" style="font-weight:700">---</div>
        <div style="font-size:10px; color:var(--txt2)" id="fecha-hoy">--/--/----</div>
      </div>
      <button class="btn-logout" onclick="location.reload()">SALIR</button>
    </div>

    <div class="search-box">
      <input type="text" class="search-input" id="input-pallet" placeholder="Nº PALLET (xxxx.xx)" inputmode="decimal">
      <button class="btn-search" id="btn-buscar" onclick="buscarPallet()">BUSCAR 🔍</button>
    </div>

    <div class="pallet-info" id="pallet-info">
      <div class="info-row"><span class="info-k">Nº Pallet</span><span class="info-v" style="color:var(--cyan)" id="v-pallet">--</span></div>
      <div class="info-row"><span class="info-k">Ubicación</span><span class="info-v" style="color:var(--green)" id="v-ubic">--</span></div>
      <div class="info-row"><span class="info-k">SAP</span><span class="info-v" id="v-sap">--</span></div>
      <div class="info-row"><span class="info-k">Descripción</span><span class="info-v" id="v-desc" style="font-size:12px">--</span></div>
      <div class="info-row"><span class="info-k">Cantidad</span><span class="info-v" style="color:var(--gold)" id="v-qty">--</span></div>
    </div>

    <div class="action-btns" id="action-btns">
      <button class="btn-act btn-realizado" onclick="registrar('REALIZADO')">REALIZADO ✅</button>
      <button class="btn-act btn-pendiente" onclick="registrar('PENDIENTE')">PENDIENTE ⏳</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbw0QsRE6vmsFPXtQSdsmJsrZxB4fmCPhYAjEp2oFgxv9BZ5rTSD0nTSZXo3IAWbecY/exec';

const OPERADORES = [
  { id:'G1', nombre:'Francisco Vigueras', emoji:'🔋' },
  { id:'G2', nombre:'Diego Nahuelcheo',   emoji:'🔋' },
  { id:'G3', nombre:'Gonzalo Díaz',       emoji:'🔋' },
  { id:'G4', nombre:'Jorge González',     emoji:'🔋' },
];

let opActual = null;
let palletActual = null;

// Reloj
setInterval(() => {
  document.getElementById('clk').textContent = new Date().toLocaleTimeString('es-CL');
}, 1000);

// Render Operadores
document.getElementById('gruero-grid').innerHTML = OPERADORES.map(op => `
  <div class="gruero-btn" onclick="selOperador('${op.id}')">
    <div style="font-size:30px">${op.emoji}</div>
    <div class="gruero-name">${op.nombre}</div>
  </div>
`).join('');

function selOperador(id) {
  opActual = OPERADORES.find(o => o.id === id);
  document.getElementById('user-name').textContent = opActual.nombre;
  document.getElementById('fecha-hoy').textContent = new Date().toLocaleDateString('es-CL');
  showScreen('s-main-screen');
}

async function buscarPallet() {
  const num = document.getElementById('input-pallet').value.trim();
  if (!num) return showToast('Ingresa un número');
  
  const btn = document.getElementById('btn-buscar');
  btn.disabled = true; btn.textContent = 'BUSCANDO...';
  
  try {
    const res = await fetch(`${SCRIPT_URL}?action=getPalletByNum&num=${num}`);
    const data = await res.json();
    
    if (data.encontrado) {
      palletActual = data.pallet;
      document.getElementById('v-pallet').textContent = palletActual.nPallet;
      document.getElementById('v-ubic').textContent = palletActual.ubicDestino || 'SIN UBICACIÓN';
      document.getElementById('v-sap').textContent = palletActual.sap;
      document.getElementById('v-desc').textContent = palletActual.descripcion;
      document.getElementById('v-qty').textContent = palletActual.cantidad;
      
      document.getElementById('pallet-info').style.display = 'block';
      document.getElementById('action-btns').style.display = 'grid';
    } else {
      showToast(data.msg || 'No encontrado');
    }
  } catch(e) {
    showToast('Error de conexión');
  }
  btn.disabled = false; btn.textContent = 'BUSCAR 🔍';
}

async function registrar(estado) {
  if (!palletActual || !opActual) return;
  
  showToast(`Registrando ${estado}...`);
  const payload = {
    rowIndex: palletActual.rowIndex,
    estado: estado,
    grueroId: opActual.id,
    grueroNombre: opActual.nombre,
    fecha: new Date().toLocaleDateString('es-CL'),
    hora: new Date().toLocaleTimeString('es-CL')
  };

  try {
    const res = await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify(payload) });
    const data = await res.json();
    if (data.ok) {
      showToast('✅ REGISTRADO CON ÉXITO');
      reset();
    } else {
      showToast('❌ ERROR AL GRABAR');
    }
  } catch(e) {
    showToast('❌ ERROR DE RED');
  }
}

function reset() {
  palletActual = null;
  document.getElementById('input-pallet').value = '';
  document.getElementById('pallet-info').style.display = 'none';
  document.getElementById('action-btns').style.display = 'none';
  document.getElementById('input-pallet').focus();
}

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('on'));
  document.getElementById(id).classList.add('on');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('on');
  setTimeout(() => t.classList.remove('on'), 3000);
}
</script>
</body>
</html>
