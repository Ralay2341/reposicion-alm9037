<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DASHBOARD - RepoSYSTEM</title>
    <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700&family=Barlow:wght@400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg: #0b0f18;
            --card: #131926;
            --linde-red: #e30613;
            --blue: #3b82f6;
            --green: #22c55e;
            --orange: #f97316;
            --txt: #e8eaf0;
            --txt-dim: #8896b0;
            --border: #1e2d45;
        }
        body {
            font-family: 'Barlow', sans-serif;
            background-color: var(--bg);
            color: var(--txt);
            margin: 0;
            padding: 0;
        }
        header {
            background: #090e1a;
            padding: 20px;
            text-align: center;
            border-bottom: 3px solid var(--linde-red);
        }
        header h1 {
            font-family: 'Barlow Condensed', sans-serif;
            margin: 0;
            letter-spacing: 2px;
            font-size: 24px;
        }
        header span { color: var(--linde-red); }
        
        .container {
            padding: 15px;
            max-width: 1000px;
            margin: 0 auto;
        }
        
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }
        
        .card {
            background: var(--card);
            border-radius: 12px;
            padding: 20px;
            border: 1px solid var(--border);
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        
        .card h3 {
            margin-top: 0;
            font-size: 16px;
            color: var(--txt-dim);
            text-transform: uppercase;
            letter-spacing: 1px;
            border-bottom: 1px solid var(--border);
            padding-bottom: 10px;
            margin-bottom: 20px;
        }

        .stats-summary {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 20px;
        }
        .stat-box {
            background: #1a2234;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
        }
        .stat-val {
            display: block;
            font-size: 24px;
            font-weight: bold;
            color: var(--linde-red);
        }
        .stat-label {
            font-size: 11px;
            color: var(--txt-dim);
            text-transform: uppercase;
        }

        .top-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }
        .top-item {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid #1e2d45;
            font-size: 13px;
        }
        .top-item:last-child { border: none; }
        .top-count {
            background: var(--linde-red);
            padding: 2px 8px;
            border-radius: 4px;
            font-weight: bold;
            font-size: 12px;
        }

        .btn-refresh {
            background: var(--linde-red);
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 50px;
            font-weight: bold;
            cursor: pointer;
            display: block;
            margin: 20px auto;
            text-transform: uppercase;
            transition: 0.3s;
        }
        .btn-refresh:active { transform: scale(0.95); }

        footer {
            text-align: center;
            padding: 30px;
            font-size: 12px;
            color: var(--txt-dim);
        }
        footer strong { color: var(--linde-red); }

        @media (max-width: 600px) {
            .grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<header>
    <h1>REPORTES <span>DINÁMICOS</span></h1>
</header>

<div class="container">
    <div class="stats-summary">
        <div class="stat-box">
            <span id="totalTareas" class="stat-val">0</span>
            <span class="stat-label">Tareas Totales</span>
        </div>
        <div class="stat-box">
            <span id="totalRealizadas" class="stat-val">0</span>
            <span class="stat-label">Realizadas</span>
        </div>
    </div>

    <button class="btn-refresh" onclick="cargarReporte()">Actualizar Datos</button>

    <div class="grid">
        <!-- Gráfico de Avance -->
        <div class="card">
            <h3>Estado de Reposición</h3>
            <canvas id="chartEstados"></canvas>
        </div>

        <!-- Gráfico de Operadores -->
        <div class="card">
            <h3>Productividad por Operador</h3>
            <canvas id="chartOperadores"></canvas>
        </div>

        <!-- Ranking de Productos -->
        <div class="card">
            <h3>Top Productos (Más Movidos)</h3>
            <div id="listaProductos" class="top-list">
                <p style="text-align:center; color:var(--txt-dim);">Cargando ranking...</p>
            </div>
        </div>
    </div>
</div>

<footer>
    Diseñado por: <strong>Raul Layseca</strong>
</footer>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwTU_4vSFf0MOoQrfceGnYTkkIxLd2ewbUWR9rIOHoZ_nXfeWN8Uti5Nu-Za3sEDLlpRQ/exec"; // REEMPLAZAR CON TU URL

    let chartEstados, chartOperadores;

    window.onload = cargarReporte;

    async function cargarReporte() {
        try {
            const resp = await fetch(`${SCRIPT_URL}?action=getReporteDatos`);
            const data = await resp.json();

            if (data.error) {
                alert("Error al cargar datos: " + data.error);
                return;
            }

            actualizarDashboard(data);
        } catch (err) {
            console.error(err);
            alert("Error de conexión con el servidor");
        }
    }

    function actualizarDashboard(data) {
        // 1. Actualizar Cifras
        document.getElementById('totalTareas').innerText = data.totalTareas;
        document.getElementById('totalRealizadas').innerText = data.porEstado['REALIZADO'] || 0;

        // 2. Gráfico de Estados (Pie)
        const ctxE = document.getElementById('chartEstados').getContext('2d');
        if (chartEstados) chartEstados.destroy();
        chartEstados = new Chart(ctxE, {
            type: 'doughnut',
            data: {
                labels: Object.keys(data.porEstado),
                datasets: [{
                    data: Object.values(data.porEstado),
                    backgroundColor: ['#22c55e', '#ef4444', '#f97316', '#3b82f6'],
                    borderWidth: 0
                }]
            },
            options: {
                plugins: { legend: { position: 'bottom', labels: { color: '#8896b0' } } }
            }
        });

        // 3. Gráfico de Operadores (Bar)
        const ctxO = document.getElementById('chartOperadores').getContext('2d');
        if (chartOperadores) chartOperadores.destroy();
        chartOperadores = new Chart(ctxO, {
            type: 'bar',
            data: {
                labels: Object.keys(data.porOperador),
                datasets: [{
                    label: 'Tareas Realizadas',
                    data: Object.values(data.porOperador),
                    backgroundColor: '#e30613'
                }]
            },
            options: {
                scales: {
                    y: { beginAtZero: true, grid: { color: '#1e2d45' }, ticks: { color: '#8896b0' } },
                    x: { ticks: { color: '#8896b0' } }
                },
                plugins: { legend: { display: false } }
            }
        });

        // 4. Ranking de Productos
        const lista = document.getElementById('listaProductos');
        lista.innerHTML = "";
        
        // Ordenar productos por cantidad
        const sortedProds = Object.entries(data.topProductos)
            .sort((a, b) => b[1] - a[1])
            .slice(0, 5); // Top 5

        if (sortedProds.length === 0) {
            lista.innerHTML = "<p style='text-align:center; color:var(--txt-dim);'>Sin datos de productos</p>";
        }

        sortedProds.forEach(([name, count]) => {
            const item = document.createElement('div');
            item.className = 'top-item';
            item.innerHTML = `<span>${name}</span><span class="top-count">${count}</span>`;
            lista.appendChild(item);
        });
    }
</script>
</body>
</html>
