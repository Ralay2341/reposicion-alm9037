<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LOGÍSTICA DASHBOARD — RepoSYSTEM</title>
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    :root {
      --bg: #070b12; --surface: #0d1420; --card: #111827;
      --red: #e30613; --blue: #3b82f6; --green: #10b981;
      --amber: #f59e0b; --purple: #8b5cf6; --txt: #e2e8f0;
      --txt-dim: #64748b; --border: #1e2d45;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--txt); min-height: 100vh; }
    
    header { background: #0a0f1c; border-bottom: 2px solid var(--red); padding: 15px 25px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; }
    header h1 { font-family: 'Rajdhani', sans-serif; font-size: 20px; letter-spacing: 2px; }
    header h1 span { color: var(--red); }

    .header-controls { text-align: right; }
    .btn-update { 
      background: var(--red); color: white; border: none; padding: 10px 20px; 
      border-radius: 5px; cursor: pointer; font-family: 'Rajdhani'; font-weight: bold; 
      display: flex; align-items: center; gap: 8px; transition: 0.3s; margin-left: auto;
    }
    .btn-update:disabled { opacity: 0.6; cursor: not-allowed; }

    /* LAYOUT: SIDEBAR + MAIN */
    .wrapper { display: flex; gap: 20px; padding: 20px; max-width: 1600px; margin: 0 auto; }
    .sidebar { width: 300px; flex-shrink: 0; }
    .main-content { flex-grow: 1; min-width: 0; }

    .kpi-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 20px; }
    .kpi { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 20px; border-top: 4px solid var(--red); }
    .kpi-val { font-family: 'Rajdhani', sans-serif; font-size: 36px; font-weight: 700; }
    .kpi-label { font-size: 11px; color: var(--txt-dim); text-transform: uppercase; letter-spacing: 1px; }

    .card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 20px; margin-bottom: 20px; }
    .card-title { font-family: 'Rajdhani', sans-serif; font-size: 14px; color: var(--txt-dim); text-transform: uppercase; border-bottom: 1px solid var(--border); padding-bottom: 10px; margin-bottom: 15px; }

    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th { text-align: left; padding: 12px; color: var(--txt-dim); border-bottom: 1px solid var(--border); font-size: 11px; text-transform: uppercase; }
    td { padding: 12px; border-bottom: 1px solid #1a2234; }
    
    .badge { padding: 4px 8px; border-radius: 4px; font-weight: bold; font-family: 'Rajdhani'; }
    .green { background: rgba(16,185,129,0.1); color: var(--green); }
    .amber { background: rgba(245,158,11,0.1); color: var(--amber); }
    .red-status { background: rgba(227,6,19,0.1); color: var(--red); }
    .blue { background: rgba(59,130,246,0.1); color: var(--blue); }

    .prog-wrap { height: 10px; background: #1a2234; border-radius: 10px; overflow: hidden; margin: 12px 0; }
    .prog-fill { height: 100%; background: var(--red); transition: width 1.2s ease-in-out; }
    
    #loader { position: fixed; inset: 0; background: rgba(7,11,18,0.95); z-index: 999; display: flex; flex-direction: column; align-items: center; justify-content: center; font-family: 'Rajdhani'; letter-spacing: 2px; }
    .hidden { display: none !important; }
    .spin { animation: spin 2s linear infinite; display: inline-block; }
    @keyframes spin { 100% { transform: rotate(360deg); } }
  </style>
</head>
<body>

<div id="loader">
  <div style="font-size: 50px; margin-bottom: 15px;" class="spin">⚙️</div>
  <span>SINCRONIZANDO REPOSYSTEM...</span>
</div>

<header>
  <h1>REPOSYSTEM <span>ALM9037</span></h1>
  <div class="header-controls">
    <button class="btn-update" onclick="cargarDatos()" id="btnUpdate">
      <span id="gearIcon">🔄</span> ACTUALIZAR DATOS
    </button>
  </div>
</header>

<div class="wrapper">
  <aside class="sidebar">
    <div class="card">
      <div class="card-title">Resumen Lateral <span>📋</span></div>
      <div id="sidebarContent" style="font-size: 13px; line-height: 1.6;">
        Selecciona "Actualizar" para ver los datos.
      </div>
      </div>
  </aside>

  <main class="main-content">
    <div class="kpi-row">
      <div class="kpi"><div class="kpi-val" id="kTotal">0</div><div class="kpi-label">Tareas Totales</div></div>
      <div class="kpi" style="border-top-color: var(--green);"><div class="kpi-val" id="kRealizadas" style="color: var(--green);">0</div><div class="kpi-label">Realizadas</div></div>
      <div class="kpi" style="border-top-color: var(--amber);"><div class="kpi-val" id="kPendientes" style="color: var(--amber);">0</div><div class="kpi-label">Pendientes</div></div>
    </div>

    <div class="card">
      <div class="card-title">Avance de Gestión <span id="lastUpdate" style="float:right; opacity:0.5; font-size:10px;"></span></div>
      <div class="prog-wrap"><div id="progGeneral" class="prog-fill" style="width:0%"></div></div>
      <div id="avanceTxt" style="font-size:12px; color:var(--txt-dim);">Esperando datos...</div>
    </div>

    <div class="card">
      <div class="card-title">Rendimiento por Operador ⚡</div>
      <div style="overflow-x: auto;">
        <table>
          <thead>
            <tr>
              <th>Operador</th>
              <th>Total</th>
              <th>Realizados</th>
              <th>Vacías</th>
              <th>P/H</th>
              <th>%</th>
            </tr>
          </thead>
          <tbody id="rendBody"></tbody>
        </table>
      </div>
    </div>
  </main>
</div>

<script>
  const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwTU_4vSFf0MOoQrfceGnYTkkIxLd2ewbUWR9rIOHoZ_nXfeWN8Uti5Nu-Za3sEDLlpRQ/exec"; 
  let charts = {};

  async function cargarDatos() {
    const btn = document.getElementById('btnUpdate');
    const gear = document.getElementById('gearIcon');
    const loader = document.getElementById('loader');

    btn.disabled = true;
    gear.classList.add('spin');
    loader.classList.remove('hidden');

    try {
      const response = await fetch(`${SCRIPT_URL}?action=getReporteDatos`);
      const data = await response.json();
      procesarReporte(data);
      document.getElementById('lastUpdate').textContent = 'Sincronizado: ' + new Date().toLocaleTimeString();
    } catch (e) {
      console.error(e);
      alert("Error al cargar.");
    } finally {
      btn.disabled = false;
      gear.classList.remove('spin');
      loader.classList.add('hidden');
    }
  }

  function procesarReporte(data) {
    // 1. Actualizar KPIs centrales
    document.getElementById('kTotal').textContent = data.totalTareas || 0;
    document.getElementById('kRealizadas').textContent = data.porEstado['REALIZADO'] || 0;
    document.getElementById('kPendientes').textContent = data.porEstado['PENDIENTE'] || 0;

    // 2. Barra de avance
    const total = data.totalTareas || 1;
    const gestionados = total - (data.porEstado['PENDIENTE'] || 0);
    const pct = Math.round((gestionados / total) * 100);
    document.getElementById('progGeneral').style.width = pct + '%';
    document.getElementById('avanceTxt').textContent = `${gestionados} de ${total} tareas procesadas (${pct}%)`;

    // 3. Llenar tabla
    const tbody = document.getElementById('rendBody');
    tbody.innerHTML = "";
    Object.entries(data.rendimientoIndividual).forEach(([nombre, s]) => {
      tbody.innerHTML += `
        <tr>
          <td><strong>${nombre}</strong></td>
          <td>${s.total}</td>
          <td><span class="badge green">${s.realizados}</span></td>
          <td><span class="badge amber">${s.vacias}</span></td>
          <td style="font-weight:bold;">${s.palletsPorHora}</td>
          <td style="color:var(--green)">${s.cumplimiento}%</td>
        </tr>`;
    });

    // 4. Sidebar: Actualizamos con texto en lugar de gráficos
    document.getElementById('sidebarContent').innerHTML = `
      <p style="color:var(--green)">● Realizados: ${data.porEstado['REALIZADO']}</p>
      <p style="color:var(--amber)">● Vacíos: ${data.porEstado['UBIC. VACÍA']}</p>
      <p style="color:var(--red)">● Errores: ${data.porEstado['COD. NO CORRESPONDE']}</p>
      <hr style="margin:10px 0; border:0; border-top:1px solid var(--border)">
      <p><b>Peak de paletización:</b> ${Object.keys(data.porHoraGrupo).length} horas activas.</p>
    `;

    // === COMENTADO PARA ELIMINAR GRÁFICOS VISUALES ===
    // actualizarGraficos(data); 
  }

  // Se mantiene la función por si quieres reactivar los gráficos después
  function actualizarGraficos(data) {
    /* if (charts.estados) charts.estados.destroy();
    const ctxE = document.getElementById('chartEstados').getContext('2d');
    charts.estados = new Chart(ctxE, { ... });
    */
  }

  window.onload = cargarDatos;
</script>
</body>
</html>
