
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Reposición ALM9037</title>
    <style>
        :root {
            --bg: #0b0f18;
            --card: #131926;
            --gold: #f0a500;
            --blue: #3b82f6;
            --green: #22c55e;
            --red: #ef4444;
            --txt: #e8eaf0;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--txt);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container {
            width: 100%;
            max-width: 500px;
        }
        .card {
            background: var(--card);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 15px;
            border: 1px solid #1e2d45;
        }
        h2 { color: var(--gold); margin-top: 0; }
        .btn {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
            font-size: 16px;
        }
        .btn-blue { background: var(--blue); color: white; }
        .btn-green { background: var(--green); color: white; }
        .btn-red { background: var(--red); color: white; }
        .status-msg {
            padding: 10px;
            border-radius: 5px;
            margin-top: 10px;
            text-align: center;
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <h2>Sistema ALM9037</h2>
            <p>Operador: <strong id="opNombre">Cargando...</strong></p>
            <div id="tareaActual">
                <p>Presione el botón para obtener tareas pendientes.</p>
            </div>
            <button class="btn btn-blue" onclick="cargarTareas()">Obtener Tareas</button>
        </div>

        <div id="controles" style="display:none;">
            <div class="card">
                <h3>Registrar Resultado</h3>
                <button class="btn btn-green" onclick="enviarResultado('REALIZADO')">REALIZADO</button>
                <button class="btn btn-red" onclick="enviarResultado('UBIC. VACÍA')">UBICACIÓN VACÍA</button>
            </div>
        </div>
        
        <div id="mensaje" class="status-msg"></div>
    </div>

    <script>
        // ============================================================
        // CONFIGURACIÓN: PEGA AQUÍ TU URL DE GOOGLE APPS SCRIPT
        // ============================================================
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbycW5dOfg-Ns4kq44urpKdpDwmp8EcJ5kWcvqRroBjQL-ily00ZiBdy9NHUqB4hJIUN/exec"; 
        
        let tareasPendientes = [];
        let indexActual = 0;
        let nombreOperador = "Francisco Vigueras"; // Cambiar según corresponda

        document.getElementById('opNombre').innerText = nombreOperador;

        async function cargarTareas() {
            mostrarMensaje("Buscando tareas...", "blue");
            try {
                const resp = await fetch(`${SCRIPT_URL}?action=getTareas`);
                const data = await resp.json();
                
                if (data.tareas && data.tareas.length > 0) {
                    tareasPendientes = data.tareas;
                    indexActual = 0;
                    mostrarTarea();
                    document.getElementById('controles').style.display = 'block';
                    mostrarMensaje(`Se encontraron ${tareasPendientes.length} tareas`, "green");
                } else {
                    document.getElementById('tareaActual').innerHTML = "<p>No hay tareas pendientes.</p>";
                    document.getElementById('controles').style.display = 'none';
                    mostrarMensaje("Sin tareas pendientes", "gold");
                }
            } catch (err) {
                mostrarMensaje("Error al conectar con el servidor", "red");
            }
        }

        function mostrarTarea() {
            const t = tareasPendientes[indexActual];
            document.getElementById('tareaActual').innerHTML = `
                <div style="border-left: 4px solid var(--gold); padding-left: 10px;">
                    <p><strong>Ubicación:</strong> ${t.ubic_origen}</p>
                    <p><strong>SAP:</strong> ${t.sap}</p>
                    <p><strong>Descripción:</strong> ${t.descripcion}</p>
                    <p><strong>Cantidad:</strong> ${t.cantidad}</p>
                    <p><strong>Destino:</strong> ${t.ubic_destino}</p>
                </div>
            `;
        }

        async function enviarResultado(resultado) {
            const t = tareasPendientes[indexActual];
            const now = new Date();
            
            const payload = {
                action: 'registrarResultado',
                folio: t.folio,
                ubic_origen: t.ubic_origen,
                sap: t.sap,
                operador: nombreOperador,
                resultado: resultado,
                fecha: now.toLocaleDateString('es-CL'),
                hora: now.toLocaleTimeString('es-CL')
            };

            mostrarMensaje("Grabando en RepoSYSTEM...", "blue");

            try {
                // Usamos mode: 'no-cors' para asegurar que la petición llegue a Google
                await fetch(SCRIPT_URL, {
                    method: 'POST',
                    mode: 'no-cors', 
                    headers: { 'Content-Type': 'text/plain' },
                    body: JSON.stringify(payload)
                });

                // Como 'no-cors' no permite leer la respuesta, asumimos éxito si no hay error de red
                mostrarMensaje("✅ Grabado correctamente", "green");
                
                // Pasar a la siguiente tarea tras 1.5 segundos
                setTimeout(() => {
                    indexActual++;
                    if (indexActual < tareasPendientes.length) {
                        mostrarTarea();
                    } else {
                        document.getElementById('tareaActual').innerHTML = "<p>¡Todas las tareas completadas!</p>";
                        document.getElementById('controles').style.display = 'none';
                    }
                }, 1500);

            } catch (err) {
                mostrarMensaje("❌ Error al grabar", "red");
            }
        }

        function mostrarMensaje(texto, color) {
            const m = document.getElementById('mensaje');
            m.innerText = texto;
            m.style.display = 'block';
            m.style.backgroundColor = color === 'red' ? '#441111' : color === 'green' ? '#114411' : '#112244';
            m.style.border = `1px solid ${color}`;
        }
    </script>
</body>
</html>
