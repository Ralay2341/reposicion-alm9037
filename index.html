<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RepoSYSTEM ALM9037</title>
    <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;700&family=Barlow:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0b0f18;
            --card: #131926;
            --gold: #f0a500;
            --blue: #3b82f6;
            --green: #22c55e;
            --red: #ef4444;
            --txt: #e8eaf0;
            --txt-dim: #8896b0;
            --border: #1e2d45;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            font-family: 'Barlow', sans-serif;
            background-color: var(--bg);
            color: var(--txt);
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        header {
            background: linear-gradient(180deg, #090e1a, #111827);
            padding: 15px;
            text-align: center;
            border-bottom: 3px solid var(--gold);
        }
        header h1 {
            font-family: 'Barlow Condensed', sans-serif;
            margin: 0;
            color: var(--gold);
            letter-spacing: 2px;
            font-size: 24px;
        }
        .nav-tabs {
            display: flex;
            background: #080b12;
            border-bottom: 1px solid var(--border);
        }
        .tab {
            flex: 1;
            padding: 15px;
            text-align: center;
            font-weight: bold;
            font-size: 13px;
            color: var(--txt-dim);
            cursor: pointer;
            transition: 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .tab.active {
            color: var(--gold);
            border-bottom: 3px solid var(--gold);
            background: rgba(240, 165, 0, 0.05);
        }
        .content {
            flex: 1;
            padding: 15px;
            max-width: 600px;
            width: 100%;
            margin: 0 auto;
        }
        .card {
            background: var(--card);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 15px;
            border: 1px solid var(--border);
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }
        .info-row {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid var(--border);
        }
        .info-row:last-child { border-bottom: none; }
        .info-label { color: var(--gold); font-size: 11px; font-weight: bold; text-transform: uppercase; }
        .info-value { font-weight: 600; font-size: 15px; }
        
        .btn {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            font-size: 15px;
            cursor: pointer;
            text-transform: uppercase;
            margin-top: 12px;
            transition: transform 0.1s;
        }
        .btn:active { transform: scale(0.98); }
        .btn-blue { background: var(--blue); color: white; }
        .btn-green { background: var(--green); color: white; }
        .btn-red { background: var(--red); color: white; }
        .btn-gold { background: var(--gold); color: var(--bg); }

        textarea {
            width: 100%;
            height: 180px;
            background: #080b12;
            color: var(--txt);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 12px;
            font-family: monospace;
            font-size: 12px;
            resize: none;
        }
        .status-msg {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            padding: 12px 24px;
            border-radius: 50px;
            font-weight: bold;
            display: none;
            z-index: 1000;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        .hidden { display: none; }
    </style>
</head>
<body>

<header>
    <h1>REPOSICIÓN ALM9037</h1>
</header>

<div class="nav-tabs">
    <div id="tabApilador" class="tab active" onclick="switchTab('apilador')">Apilador</div>
    <div id="tabSupervisor" class="tab" onclick="switchTab('supervisor')">Supervisor</div>
</div>

<div class="content">
    <!-- SECCIÓN APILADOR -->
    <div id="secApilador">
        <div class="card">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
                <h3 style="margin:0; color: var(--gold);">TAREA ACTUAL</h3>
                <span id="contador" style="font-size: 12px; color: var(--txt-dim);">0 / 0</span>
            </div>
            <div id="tareaContenido">
                <p style="text-align: center; color: var(--txt-dim); padding: 20px;">Presione el botón azul para cargar tareas pendientes.</p>
            </div>
            <button class="btn btn-blue" onclick="cargarTareas()">Obtener Tareas</button>
        </div>

        <div id="controlesApilador" class="hidden">
            <div class="card" style="text-align: center;">
                <h3 style="margin-bottom: 15px; font-size: 14px;">REGISTRAR RESULTADO</h3>
                <div style="display: flex; gap: 10px;">
                    <button class="btn btn-green" style="margin-top:0;" onclick="enviarResultado('REALIZADO')">REALIZADO</button>
                    <button class="btn btn-red" style="margin-top:0;" onclick="enviarResultado('UBIC. VACÍA')">VACÍA</button>
                </div>
            </div>
        </div>
    </div>

    <!-- SECCIÓN SUPERVISOR -->
    <div id="secSupervisor" class="hidden">
        <div class="card">
            <h3 style="margin-bottom: 10px;">CARGA MASIVA</h3>
            <p style="font-size: 11px; color: var(--txt-dim); margin-bottom: 15px;">
                Pegue las filas de Excel (13 columnas).<br>
                Folio | Fecha | Operador | Q | Ubic | SAP | Barcode | Desc | Cant | Lote | Venc | Impo | Destino
            </p>
            <textarea id="areaPegado" placeholder="Pegue aquí las filas de su planilla..."></textarea>
            <button class="btn btn-gold" onclick="procesarTareasMasivas()">Procesar Tareas →</button>
        </div>
    </div>
</div>

<div id="mensajeGlobal" class="status-msg"></div>

<script>
    // ============================================================
    // CONFIGURACIÓN: REEMPLAZA CON TU URL DE GOOGLE APPS SCRIPT
    // ============================================================
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwTU_4vSFf0MOoQrfceGnYTkkIxLd2ewbUWR9rIOHoZ_nXfeWN8Uti5Nu-Za3sEDLlpRQ/exec"; 
    
    let tareasPendientes = [];
    let indexActual = 0;
    let nombreOperador = "Francisco Vigueras"; // Puedes cambiarlo o hacerlo dinámico

    // Manejo de parámetros URL (?modo=supervisor)
    window.onload = () => {
        const urlParams = new URLSearchParams(window.location.search);
        const modo = urlParams.get('modo');
        if (modo === 'supervisor') switchTab('supervisor');
    };

    function switchTab(tab) {
        document.getElementById('secApilador').classList.toggle('hidden', tab !== 'apilador');
        document.getElementById('secSupervisor').classList.toggle('hidden', tab !== 'supervisor');
        document.getElementById('tabApilador').classList.toggle('active', tab === 'apilador');
        document.getElementById('tabSupervisor').classList.toggle('active', tab === 'supervisor');
    }

    function mostrarMensaje(texto, tipo) {
        const m = document.getElementById('mensajeGlobal');
        m.innerText = texto;
        m.style.display = 'block';
        m.style.backgroundColor = tipo === 'error' ? 'var(--red)' : tipo === 'success' ? 'var(--green)' : 'var(--blue)';
        setTimeout(() => m.style.display = 'none', 3000);
    }

    // --- LÓGICA APILADOR ---
    async function cargarTareas() {
        mostrarMensaje("Buscando tareas...", "info");
        try {
            const resp = await fetch(`${SCRIPT_URL}?action=getTareas`);
            const data = await resp.json();
            if (data.tareas && data.tareas.length > 0) {
                tareasPendientes = data.tareas;
                indexActual = 0;
                mostrarTarea();
                document.getElementById('controlesApilador').classList.remove('hidden');
                mostrarMensaje("Tareas cargadas", "success");
            } else {
                document.getElementById('tareaContenido').innerHTML = "<p style='text-align:center; color:var(--txt-dim);'>No hay tareas pendientes.</p>";
                document.getElementById('controlesApilador').classList.add('hidden');
                document.getElementById('contador').innerText = "0 / 0";
                mostrarMensaje("Sin tareas", "info");
            }
        } catch (err) { mostrarMensaje("Error de conexión", "error"); }
    }

    function mostrarTarea() {
        const t = tareasPendientes[indexActual];
        document.getElementById('contador').innerText = `${indexActual + 1} / ${tareasPendientes.length}`;
        document.getElementById('tareaContenido').innerHTML = `
            <div class="info-row"><span class="info-label">Ubicación Origen</span><span class="info-value" style="color:var(--gold);">${t.ubic_origen}</span></div>
            <div class="info-row"><span class="info-label">SAP / Barcode</span><span class="info-value">${t.sap}</span></div>
            <div class="info-row"><span class="info-label">Descripción</span><span class="info-value" style="font-size:13px;">${t.descripcion}</span></div>
            <div class="info-row"><span class="info-label">Cantidad / Lote</span><span class="info-value">${t.cantidad} (Lote: ${t.lote})</span></div>
            <div class="info-row"><span class="info-label">Vencimiento</span><span class="info-value">${t.venc}</span></div>
            <div class="info-row"><span class="info-label">Ubicación Destino</span><span class="info-value" style="color:var(--green);">${t.ubic_destino}</span></div>
        `;
    }

    async function enviarResultado(resultado) {
        const t = tareasPendientes[indexActual];
        const now = new Date();
        const payload = {
            action: 'registrarResultado',
            folio: t.folio,
            ubic_origen: t.ubic_origen,
            sap: t.sap,
            operador: nombreOperador,
            resultado: resultado,
            fecha: now.toLocaleDateString('es-CL'),
            hora: now.toLocaleTimeString('es-CL')
        };

        mostrarMensaje("Grabando...", "info");
        try {
            await fetch(SCRIPT_URL, {
                method: 'POST',
                mode: 'no-cors',
                headers: { 'Content-Type': 'text/plain' },
                body: JSON.stringify(payload)
            });
            mostrarMensaje("✅ Grabado", "success");
            setTimeout(() => {
                indexActual++;
                if (indexActual < tareasPendientes.length) mostrarTarea();
                else {
                    document.getElementById('tareaContenido').innerHTML = "<p style='text-align:center; color:var(--green);'>¡Todas las tareas completadas!</p>";
                    document.getElementById('controlesApilador').classList.add('hidden');
                    document.getElementById('contador').innerText = "FIN";
                }
            }, 800);
        } catch (err) { mostrarMensaje("Error al grabar", "error"); }
    }

    // --- LÓGICA SUPERVISOR ---
    async function procesarTareasMasivas() {
        const texto = document.getElementById('areaPegado').value;
        if (!texto.trim()) return alert("Pega las filas de Excel primero.");

        const filas = texto.split('\n');
        const tareasParaEnviar = [];

        filas.forEach(fila => {
            if(!fila.trim()) return;
            const c = fila.split('\t'); 
            if (c.length >= 5) {
                tareasParaEnviar.push({
                    folio: c[0]||'', fecha: c[1]||'', operador: c[2]||'', q_pallets: c[3]||'1',
                    ubic_origen: c[4]||'', sap: c[5]||'', barcode: c[6]||'', descripcion: c[7]||'',
                    cantidad: c[8]||'', lote: c[9]||'', venc: c[10]||'', impo: c[11]||'', ubic_destino: c[12]||''
                });
            }
        });

        if(tareasParaEnviar.length === 0) return alert("No se detectaron filas válidas.");

        mostrarMensaje(`Enviando ${tareasParaEnviar.length} tareas...`, "info");
        try {
            await fetch(SCRIPT_URL, {
                method: 'POST',
                mode: 'no-cors',
                headers: { 'Content-Type': 'text/plain' },
                body: JSON.stringify({ action: 'cargarTareas', tareas: tareasParaEnviar })
            });
            alert(`✅ ${tareasParaEnviar.length} tareas enviadas al sistema.`);
            document.getElementById('areaPegado').value = "";
            mostrarMensaje("Carga completada", "success");
        } catch (err) { alert("Error en la carga masiva."); }
    }
</script>
</body>
</html>
