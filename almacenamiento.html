<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Almacenamiento ALM9037 - V3</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@600;700&family=Share+Tech+Mono&family=Exo+2:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #080c14; --surface: #0e1520; --card: #121c2e; --border: #1e3050;
  --gold: #f0a500; --cyan: #00d4ff; --green: #00e676; --red: #ff4444;
  --orange: #ff8c00; --txt: #d0e4ff; --txt2: #6b8aac; --purple: #a855f7;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--txt); font-family: 'Exo 2', sans-serif; height: 100vh; overflow: hidden; }

.hdr { background: #0a1020; border-bottom: 2px solid var(--gold); padding: 10px 18px; display: flex; justify-content: space-between; align-items: center; }
.hdr-logo { font-family: 'Rajdhani', sans-serif; font-size: 22px; font-weight: 700; color: var(--gold); letter-spacing: 2px; }
.hdr-clock { font-family: 'Share Tech Mono', monospace; font-size: 18px; color: var(--cyan); }

.screen { position: fixed; inset: 0; padding-top: 60px; display: none; flex-direction: column; overflow-y: auto; }
.screen.on { display: flex; }

/* LANDING */
#s-landing { align-items: center; justify-content: center; padding: 20px; }
.landing-inner { width: 100%; max-width: 400px; display: flex; flex-direction: column; gap: 14px; }
.landing-title { font-family: 'Rajdhani', sans-serif; font-size: 18px; font-weight: 700; color: var(--gold); text-align: center; letter-spacing: 1px; }
.gruero-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; width: 100%; }
.gruero-btn { background: var(--card); border: 2px solid var(--border); border-radius: 12px; padding: 20px; text-align: center; cursor: pointer; transition: border-color 0.2s, transform 0.1s; }
.gruero-btn:active { transform: scale(0.95); border-color: var(--gold); }
.gruero-btn.disabled { opacity: .35; cursor: not-allowed; filter: grayscale(1); }
.gruero-btn.disabled:active { transform: none; border-color: var(--border); }
.gruero-name { font-family: 'Rajdhani', sans-serif; font-weight: 700; margin-top: 8px; }
.no-import-hint { text-align: center; font-size: 11px; color: var(--txt2); letter-spacing: .5px; padding: 4px 0; display: none; }
.no-import-hint.on { display: block; }
/* Badge importación en landing */
.landing-import-badge {
  display: none; width: 100%;
  background: rgba(168,85,247,.1); border: 1px solid rgba(168,85,247,.35);
  border-radius: 10px; padding: 10px 14px;
  align-items: center; justify-content: space-between;
  animation: fadeIn .3s ease;
}
.landing-import-badge.on { display: flex; }
/* Botón supervisor en landing */
.btn-supervisor-landing {
  width: 100%; padding: 14px; border-radius: 10px;
  background: transparent; border: 2px solid rgba(168,85,247,.4);
  color: var(--purple); font-family: 'Rajdhani', sans-serif;
  font-size: 16px; font-weight: 700; letter-spacing: 1px;
  cursor: pointer; transition: background .2s, border-color .2s; text-transform: uppercase;
}
.btn-supervisor-landing:active { background: rgba(168,85,247,.12); border-color: var(--purple); }

/* MAIN */
#s-main { padding: 15px; max-width: 500px; margin: 0 auto; width: 100%; }

/* USER BAR */
.user-bar {
  background: var(--card); padding: 12px; border-radius: 12px;
  display: flex; justify-content: space-between; align-items: center;
  margin-bottom: 15px; border: 1px solid var(--border);
}
.user-bar-btns { display: flex; gap: 8px; align-items: center; }
.btn-logout {
  background: transparent; border: 1px solid var(--red);
  color: var(--red); padding: 5px 10px; border-radius: 6px;
  font-size: 11px; cursor: pointer; font-family: 'Exo 2', sans-serif;
  font-weight: 600; letter-spacing: .5px;
}
.btn-supervisor {
  background: transparent; border: 1px solid var(--purple);
  color: var(--purple); padding: 5px 10px; border-radius: 6px;
  font-size: 11px; cursor: pointer; font-family: 'Exo 2', sans-serif;
  font-weight: 700; letter-spacing: .5px;
  transition: background .2s;
}
.btn-supervisor:active { background: rgba(168,85,247,.15); }

/* BADGE IMPORTACIÓN ACTIVA */
.import-badge {
  display: none;
  background: rgba(168,85,247,.1);
  border: 1px solid rgba(168,85,247,.35);
  border-radius: 10px;
  padding: 9px 14px;
  margin-bottom: 12px;
  align-items: center;
  justify-content: space-between;
  animation: fadeIn .3s ease;
}
.import-badge.on { display: flex; }
.import-badge-left { display: flex; align-items: center; gap: 10px; }
.import-badge-icon { font-size: 18px; }
.import-badge-k { font-size: 10px; color: var(--txt2); text-transform: uppercase; letter-spacing: .5px; margin-bottom: 2px; }
.import-badge-v { font-family: 'Share Tech Mono', monospace; font-size: 16px; color: var(--purple); letter-spacing: 2px; font-weight: 700; }
.import-badge-clear {
  font-size: 10px; color: var(--txt2); cursor: pointer;
  border: 1px solid var(--border); border-radius: 5px;
  padding: 4px 8px; font-weight: 600; font-family: 'Exo 2', sans-serif;
}

/* SEARCH BOX */
.search-box { background: var(--card); padding: 15px; border-radius: 12px; border: 1px solid var(--border); margin-bottom: 15px; }

/* INPUT NORMAL (sin importación bloqueada) */
.input-wrapper { position: relative; margin-bottom: 8px; }
.search-input {
  width: 100%; background: var(--bg); border: 2px solid var(--border);
  border-radius: 8px; padding: 14px 48px 14px 14px;
  color: #fff; font-family: 'Share Tech Mono', monospace;
  font-size: 22px; outline: none; letter-spacing: 2px; transition: border-color 0.2s;
}
.search-input:focus { border-color: var(--gold); }
.search-input.buscando { border-color: var(--cyan); animation: pulse-border 0.8s infinite; }
.search-input.encontrado { border-color: var(--green); }
.search-input.error { border-color: var(--red); }

/* INPUT DIVIDIDO (con prefijo de importación bloqueado) */
.split-input-wrapper {
  display: none;
  align-items: center;
  background: var(--bg);
  border: 2px solid var(--border);
  border-radius: 8px;
  margin-bottom: 8px;
  overflow: hidden;
  transition: border-color .2s;
}
.split-input-wrapper.on { display: flex; }
.split-input-wrapper.buscando { border-color: var(--cyan); animation: pulse-border 0.8s infinite; }
.split-input-wrapper.encontrado { border-color: var(--green); }
.split-input-wrapper.error { border-color: var(--red); }

.split-prefix {
  font-family: 'Share Tech Mono', monospace;
  font-size: 22px; letter-spacing: 2px;
  color: var(--purple); padding: 14px 0 14px 14px;
  flex-shrink: 0; user-select: none; white-space: nowrap;
}
.split-suffix {
  flex: 1; background: transparent; border: none; outline: none;
  font-family: 'Share Tech Mono', monospace; font-size: 22px;
  letter-spacing: 4px; color: #fff;
  padding: 14px 48px 14px 2px;
  width: 80px; min-width: 0;
}
.split-suffix::placeholder { color: #2a4060; letter-spacing: 2px; }

.status-icon {
  position: absolute; right: 14px; top: 50%;
  transform: translateY(-50%); font-size: 20px;
}
/* Para split-input el status va relativo al wrapper */
.split-status {
  position: relative; flex-shrink: 0;
  font-size: 20px; padding-right: 14px; line-height: 1;
  display: flex; align-items: center;
}

@keyframes pulse-border {
  0%, 100% { border-color: var(--cyan); box-shadow: 0 0 0 0 rgba(0,212,255,.3); }
  50%       { border-color: var(--cyan); box-shadow: 0 0 0 6px rgba(0,212,255,0); }
}

.search-hint {
  font-size: 11px; color: var(--txt2); text-align: center;
  font-family: 'Share Tech Mono', monospace; min-height: 16px; transition: color .2s;
}
.search-hint.active { color: var(--cyan); }
.search-hint.ok { color: var(--green); }
.search-hint.err { color: var(--red); }
.search-hint.sup { color: var(--purple); }

/* RESULTADOS */
.pallet-info {
  background: var(--card); padding: 15px; border-radius: 12px;
  border: 1px solid var(--border); margin-bottom: 15px;
  display: none; animation: fadeIn 0.3s ease;
}
@keyframes fadeIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
.info-row { display: flex; justify-content: space-between; padding: 9px 0; border-bottom: 1px solid #1e3050; align-items: center; }
.info-row:last-child { border-bottom: none; }
.info-k { font-size: 11px; color: var(--txt2); text-transform: uppercase; }
.info-v { font-family: 'Share Tech Mono', monospace; font-size: 15px; text-align: right; max-width: 65%; word-break: break-word; }

.action-btns { display: none; grid-template-columns: 1fr 1fr; gap: 10px; }
.btn-act { padding: 20px; border-radius: 12px; border: none; font-family: 'Rajdhani', sans-serif; font-weight: 700; font-size: 17px; cursor: pointer; color: #000; transition: transform 0.1s, filter 0.1s; }
.btn-realizado { background: var(--green); }
.btn-pendiente { background: var(--orange); }
.btn-act:active { transform: scale(0.95); filter: brightness(0.9); }

/* SPINNER */
.spinner { display: inline-block; width: 18px; height: 18px; border: 3px solid rgba(0,212,255,.3); border-top-color: var(--cyan); border-radius: 50%; animation: spin .7s linear infinite; vertical-align: middle; }
@keyframes spin { to { transform: rotate(360deg); } }

/* TOAST */
.toast { position: fixed; bottom: 20px; left: 20px; right: 20px; background: #000; border: 1px solid var(--border); padding: 15px; border-radius: 10px; text-align: center; transform: translateY(100px); transition: .3s; z-index: 100; font-family: 'Rajdhani', sans-serif; font-size: 16px; font-weight: 600; }
.toast.on { transform: translateY(0); }
.toast.ok { border-color: var(--green); color: var(--green); }
.toast.err { border-color: var(--red); color: var(--red); }

/* ════════════════════════════════════════
   MODAL BASE
════════════════════════════════════════ */
.modal-overlay {
  position: fixed; inset: 0; z-index: 200;
  background: rgba(0,0,0,.75); backdrop-filter: blur(4px);
  display: none; align-items: center; justify-content: center;
  padding: 20px;
}
.modal-overlay.on { display: flex; }

.modal-box {
  background: #0e1520; border: 2px solid var(--purple);
  border-radius: 18px; padding: 28px 24px;
  width: 100%; max-width: 360px;
  box-shadow: 0 0 40px rgba(168,85,247,.2);
  animation: modalIn .25s cubic-bezier(.34,1.56,.64,1);
}
@keyframes modalIn { from { transform: scale(.85); opacity:0; } to { transform: scale(1); opacity:1; } }

.modal-title {
  font-family: 'Rajdhani', sans-serif;
  font-size: 20px; font-weight: 700; color: var(--purple);
  text-align: center; margin-bottom: 20px;
}
.modal-input {
  width: 100%; background: var(--bg); border: 2px solid var(--border);
  border-radius: 8px; padding: 14px; color: #fff;
  font-family: 'Share Tech Mono', monospace; font-size: 22px;
  outline: none; letter-spacing: 2px; text-align: center;
  margin-bottom: 15px;
}
.modal-input:focus { border-color: var(--purple); }
.modal-input::placeholder { color: #2a4060; }
.modal-btn {
  width: 100%; padding: 14px; border-radius: 10px;
  background: var(--purple); border: none; color: #fff;
  font-family: 'Rajdhani', sans-serif; font-size: 16px;
  font-weight: 700; letter-spacing: 1px; cursor: pointer;
  transition: background .2s; text-transform: uppercase;
}
.modal-btn:active { background: #9333ea; }
.modal-btn:disabled { opacity: .35; cursor: not-allowed; }
.modal-error { font-size: 11px; color: var(--red); text-align: center; min-height: 16px; margin-top: -10px; margin-bottom: 10px; }

/* ════════════════════════════════════════
   MODAL CLAVE
════════════════════════════════════════ */
#modal-clave .modal-box { border-color: var(--gold); box-shadow: 0 0 40px rgba(240,165,0,.2); }
#modal-clave .modal-title { color: var(--gold); }
#modal-clave .modal-btn { background: var(--gold); }
#modal-clave .modal-btn:active { background: #d49000; }

.clave-dots { display: flex; justify-content: center; gap: 8px; margin-bottom: 20px; }
.clave-dot { width: 14px; height: 14px; border-radius: 50%; background: var(--border); transition: background .2s; }
.clave-dot.on { background: var(--gold); }

.teclado-grid {
  display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px;
  width: 100%; max-width: 280px; margin: 0 auto;
}
.teclado-grid button {
  background: #182236; border: 1px solid #1e3050; border-radius: 8px;
  padding: 16px; font-size: 20px; font-family: 'Share Tech Mono', monospace;
  color: var(--txt); cursor: pointer; transition: background .1s;
}
.teclado-grid button:active { background: #243452; }
.teclado-grid button.confirm { color: var(--green); }
.teclado-grid button.delete { color: var(--red); }

/* ════════════════════════════════════════
   MODAL IMPORTACIÓN
════════════════════════════════════════ */
#modal-import .modal-box { border-color: var(--purple); box-shadow: 0 0 40px rgba(168,85,247,.2); }
#modal-import .modal-title { color: var(--purple); }
#modal-import .modal-btn { background: var(--purple); }
#modal-import .modal-btn:active { background: #9333ea; }

</style>
</head>
<body>

<div class="hdr">
  <div class="hdr-logo">ALM9037</div>
  <div class="hdr-clock" id="clk"></div>
</div>

<!-- LANDING SCREEN -->
<div class="screen on" id="s-landing">
  <div class="landing-inner">
    <div class="landing-title">Selecciona tu usuario</div>
    <div class="gruero-grid" id="gruero-grid"></div>
    <div class="no-import-hint on" id="no-import-hint">El supervisor debe asignar una importación primero</div>

    <div class="landing-import-badge" id="landing-import-badge">
      <div style="display:flex;align-items:center;gap:10px;">
        <div style="font-size:20px;">📦</div>
        <div>
          <div style="font-size:10px;color:var(--txt2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:2px;">Importación Activa</div>
          <div style="font-family:'Share Tech Mono',monospace;font-size:16px;color:var(--purple);letter-spacing:2px;font-weight:700;" id="landing-import-num"></div>
        </div>
      </div>
      <div style="font-size:10px;color:var(--txt2);cursor:pointer;border:1px solid var(--border);border-radius:5px;padding:4px 8px;font-weight:600;font-family:'Exo 2',sans-serif;" onclick="limpiarImportacion()">Limpiar</div>
    </div>

    <button class="btn-supervisor-landing" onclick="abrirModalClave()"> Supervisor</button>
  </div>
</div>

<!-- MAIN SCREEN -->
<div class="screen" id="s-main-screen">
  <div class="user-bar">
    <div style="display:flex;align-items:center;gap:10px;">
      <div style="font-size:20px;">👨‍🏭</div>
      <div style="font-weight:700;" id="user-name"></div>
    </div>
    <div class="user-bar-btns">
      <div class="btn-supervisor" onclick="abrirModalClave()">Supervisor</div>
      <div class="btn-logout" onclick="volverLanding()">Salir</div>
    </div>
  </div>

  <div class="import-badge" id="import-badge">
    <div class="import-badge-left">
      <div class="import-badge-icon">📦</div>
      <div>
        <div class="import-badge-k">Importación Activa</div>
        <div class="import-badge-v" id="import-badge-num"></div>
      </div>
    </div>
    <div class="import-badge-clear" onclick="limpiarImportacion()">Limpiar</div>
  </div>

  <div class="search-box">
    <div class="input-wrapper" id="wrapper-normal">
      <input type="text" class="search-input" id="input-pallet" placeholder="Pallet" autocomplete="off" inputmode="numeric">
      <div class="status-icon" id="status-icon-normal"></div>
    </div>
    <div class="split-input-wrapper" id="wrapper-split">
      <div class="split-prefix" id="split-prefix"></div>
      <input type="text" class="split-suffix" id="input-suffix" placeholder="XX" autocomplete="off" inputmode="numeric">
      <div class="split-status" id="status-icon-split"></div>
    </div>
    <div class="search-hint" id="search-hint">Ingresa o escanea el número de pallet</div>
  </div>

  <div class="pallet-info" id="pallet-info">
    <div class="info-row">
      <div class="info-k">Pallet</div>
      <div class="info-v" id="v-pallet"></div>
    </div>
    <div class="info-row">
      <div class="info-k">Ubicación</div>
      <div class="info-v" id="v-ubic"></div>
    </div>
    <div class="info-row">
      <div class="info-k">SAP</div>
      <div class="info-v" id="v-sap"></div>
    </div>
    <div class="info-row">
      <div class="info-k">Descripción</div>
      <div class="info-v" id="v-desc"></div>
    </div>
    <div class="info-row">
      <div class="info-k">Cantidad</div>
      <div class="info-v" id="v-qty"></div>
    </div>
  </div>

  <div class="action-btns" id="action-btns">
    <button class="btn-act btn-realizado" onclick="registrar('REALIZADO')">Realizado</button>
    <button class="btn-act btn-pendiente" onclick="registrar('PENDIENTE')">Pendiente</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<!-- MODAL CLAVE -->
<div class="modal-overlay" id="modal-clave">
  <div class="modal-box">
    <div class="modal-title">Ingresa Clave Supervisor</div>
    <div class="clave-dots">
      <div class="clave-dot" id="dot-0"></div>
      <div class="clave-dot" id="dot-1"></div>
      <div class="clave-dot" id="dot-2"></div>
      <div class="clave-dot" id="dot-3"></div>
      <div class="clave-dot" id="dot-4"></div>
    </div>
    <div class="modal-error" id="error-clave"></div>
    <div class="teclado-grid" id="teclado-clave"></div>
    <button class="modal-btn" id="btn-confirmar-clave" onclick="confirmarClave()" disabled>Confirmar</button>
  </div>
</div>

<!-- MODAL NÚMERO IMPORTACIÓN -->
<div class="modal-overlay" id="modal-import">
  <div class="modal-box">
    <div class="modal-title">Asignar Importación</div>
    <input type="text" class="modal-input" id="input-import" placeholder="XXXX" maxlength="4" inputmode="numeric" oninput="onImportInput()">
    <div class="modal-error" id="error-import"></div>
    <button class="modal-btn" id="btn-confirmar-import" onclick="confirmarImport()" disabled>Asignar</button>
  </div>
</div>

<script>
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbw0QsRE6vmsFPXtQSdsmJsrZxB4fmCPhYAjEp2oFgxv9BZ5rTSD0nTSZXo3IAWbecY/exec';
const CLAVE_SUPERVISOR = '00435';

const OPERADORES = [
  { id:'G1', nombre:'Francisco Vigueras', emoji:'🔋' },
  { id:'G2', nombre:'Diego Nahuelcheo',   emoji:'🔋' },
  { id:'G3', nombre:'Gonzalo Díaz',       emoji:'🔋' },
  { id:'G4', nombre:'Jorge González',     emoji:'🔋' },
];

let opActual       = null;
let palletActual   = null;
let debounceTimer  = null;
let buscando       = false;
let importActivo   = '';   // '' = sin importación bloqueada, '1864' = bloqueada

// ── INICIALIZACIÓN ──────────────────────────────────
window.onload = async () => {
  // 1. Iniciar Reloj
  setInterval(() => {
    document.getElementById('clk').textContent = new Date().toLocaleTimeString('es-CL');
  }, 1000);

  // 2. Consultar Importación Activa al cargar la página
  try {
    const response = await fetch(`${SCRIPT_URL}?action=getImportacionActiva`);
    const data = await response.json();
    if (data.ok && data.importacionActiva) {
      importActivo = data.importacionActiva;
      activarModoImportacion(importActivo);
      showToast('📦 Importación ' + importActivo + ' cargada', 'ok');
    }
  } catch (e) {
    console.error('Error al cargar importación inicial:', e);
  }
};

// ── OPERADORES ────────────────────────────────────
document.getElementById('gruero-grid').innerHTML = OPERADORES.map(op => `
  <div class="gruero-btn disabled" id="btn-op-${op.id}" onclick="selOperador('${op.id}')">
    <div style="font-size:30px">${op.emoji}</div>
    <div class="gruero-name">${op.nombre}</div>
  </div>
`).join('');

function setOperadoresActivos(activo) {
  OPERADORES.forEach(op => {
    const btn = document.getElementById('btn-op-' + op.id);
    if (activo) {
      btn.classList.remove('disabled');
    } else {
      btn.classList.add('disabled');
    }
  });
  const hint = document.getElementById('no-import-hint');
  if (activo) hint.classList.remove('on'); else hint.classList.add('on');
}

async function selOperador(id) {
  opActual = OPERADORES.find(o => o.id === id);
  document.getElementById('user-name').textContent  = opActual.nombre;
  document.getElementById('fecha-hoy').textContent  = new Date().toLocaleDateString('es-CL');
  showScreen('s-main-screen');

  // NUEVO: Consultar la importación activa del backend
  try {
    const response = await fetch(`${SCRIPT_URL}?action=getImportacionActiva`, { method: 'GET' });
    const data = await response.json();
    if (data.ok && data.importacionActiva) {
      importActivo = data.importacionActiva; // Actualizar la variable local
      activarModoImportacion(importActivo);
    } else if (!data.ok) {
      console.error('Error al obtener importación activa del backend:', data.error);
    }
  } catch (e) {
    console.error('Error de red al obtener importación activa:', e);
  }

  // Si el supervisor ya asignó importación, activar modo dividido
  if (importActivo) {
    activarModoImportacion(importActivo);
  } else {
    setTimeout(() => document.getElementById('input-pallet').focus(), 150);
  }
}

// ════════════════════════════════════════════════
//  MODAL CONTRASEÑA
// ════════════════════════════════════════════════
let claveIngresada = '';

function buildTeclado() {
  const nums = ['1','2','3','4','5','6','7','8','9','←','0','✓'];
  document.getElementById('teclado-clave').innerHTML = nums.map(n => `
    <button onclick="teclaPresionada('${n}')"
      style="background:#182236;border:1px solid #1e3050;border-radius:8px;
             padding:16px;font-size:20px;font-family:'Share Tech Mono',monospace;
             color:${n==='✓'?'var(--green)':n==='←'?'var(--red)':'var(--txt)'};
             cursor:pointer;transition:background .1s;"
      onmousedown="this.style.background='#243452'"
      onmouseup="this.style.background='#182236'"
      ontouchstart="this.style.background='#243452'"
      ontouchend="this.style.background='#182236'"
    >${n}</button>
  `).join('');
}
buildTeclado();

function teclaPresionada(k) {
  if (k === '←') {
    claveIngresada = claveIngresada.slice(0, -1);
  } else if (k === '✓') {
    confirmarClave();
    return;
  } else {
    if (claveIngresada.length < 5) claveIngresada += k;
  }
  actualizarDots();
  document.getElementById('error-clave').textContent = '';
  document.getElementById('btn-confirmar-clave').disabled = (claveIngresada.length < 5);
}

function actualizarDots() {
  for (let i = 0; i < 5; i++) {
    document.getElementById('dot-' + i).classList.toggle('on', i < claveIngresada.length);
  }
}

function abrirModalClave() {
  claveIngresada = '';
  actualizarDots();
  document.getElementById('error-clave').textContent  = '';
  document.getElementById('btn-confirmar-clave').disabled = true;
  document.getElementById('modal-clave').classList.add('on');
}

function cerrarModalClave() {
  claveIngresada = '';
  actualizarDots();
  document.getElementById('modal-clave').classList.remove('on');
}

function confirmarClave() {
  if (claveIngresada === CLAVE_SUPERVISOR) {
    cerrarModalClave();
    // Abrir modal de importación
    setTimeout(() => abrirModalImport(), 150);
  } else {
    document.getElementById('error-clave').textContent = '⛔ Contraseña incorrecta';
    // Animar input como error
    const inp = document.getElementById('input-clave');
    inp.classList.add('shake');
    // Shake en los dots
    document.getElementById('teclado-clave').style.animation = '';
    setTimeout(() => { inp.classList.remove('shake'); }, 400);
    // Limpiar
    claveIngresada = '';
    actualizarDots();
    document.getElementById('btn-confirmar-clave').disabled = true;
  }
}

// ════════════════════════════════════════════════
//  MODAL NÚMERO IMPORTACIÓN
// ════════════════════════════════════════════════
function abrirModalImport() {
  document.getElementById('input-import').value      = '';
  document.getElementById('error-import').textContent = '';
  document.getElementById('btn-confirmar-import').disabled = true;
  document.getElementById('modal-import').classList.add('on');
  setTimeout(() => document.getElementById('input-import').focus(), 200);
}

function cerrarModalImport() {
  document.getElementById('modal-import').classList.remove('on');
}

function onImportInput() {
  const val = document.getElementById('input-import').value.replace(/\D/g, '').slice(0, 4);
  document.getElementById('input-import').value = val;
  document.getElementById('error-import').textContent = '';
  document.getElementById('btn-confirmar-import').disabled = (val.length !== 4);
}

async function confirmarImport() {
  const val = document.getElementById('input-import').value.replace(/\D/g, '');
  if (val.length !== 4) return;

  importActivo = val;
  cerrarModalImport();

  // NUEVO: Enviar la importación activa al backend (Usamos GET para simplificar con Apps Script)
  try {
    const response = await fetch(`${SCRIPT_URL}?action=setImportacionActiva&num=${encodeURIComponent(val)}`);
    const data = await response.json();
    if (data.ok) {
      activarModoImportacion(val);
      showToast('✅ Importación ' + val + ' activada', 'ok');
    } else {
      showToast('❌ Error al guardar en servidor', 'err');
    }
  } catch (e) {
    showToast('❌ Error de conexión', 'err');
  }
}

// ════════════════════════════════════════════════
//  MODO IMPORTACIÓN BLOQUEADA
// ════════════════════════════════════════════════
function activarModoImportacion(num) {
  importActivo = num;

  // Activar botones de operadores
  setOperadoresActivos(true);

  // Badge en landing
  document.getElementById('landing-import-num').textContent = num;
  document.getElementById('landing-import-badge').classList.add('on');

  // Badge en pantalla del operador (solo lectura)
  document.getElementById('import-badge-num').textContent = num;
  document.getElementById('import-badge').classList.add('on');

  // Ocultar input normal, mostrar input dividido
  document.getElementById('wrapper-normal').style.display = 'none';
  document.getElementById('wrapper-split').classList.add('on');
  document.getElementById('split-prefix').textContent = num + '.';

  // Limpiar y enfocar
  document.getElementById('input-suffix').value = '';
  resetSplitEstado();
  setHint('Ingresa los 2 dígitos del pallet  (' + num + '.XX)', 'sup');
  ocultarResultados();

  setTimeout(() => document.getElementById('input-suffix').focus(), 150);
}

function limpiarImportacion() {
  importActivo = '';
  setOperadoresActivos(false);
  document.getElementById('landing-import-badge').classList.remove('on');
  document.getElementById('import-badge').classList.remove('on');
  document.getElementById('wrapper-split').classList.remove('on');
  document.getElementById('wrapper-normal').style.display = '';
  document.getElementById('input-pallet').value = '';
  document.getElementById('input-suffix').value  = '';
  ocultarResultados();
  resetNormalEstado();
  setHint('Ingresa o escanea el número de pallet', '');
}

function volverLanding() {
  palletActual = null;
  ocultarResultados();
  showScreen('s-landing');
  // Si hay importación activa, re-aplicar estado visual del split al volver
  if (importActivo) {
    document.getElementById('wrapper-normal').style.display = 'none';
    document.getElementById('wrapper-split').classList.add('on');
  }
}

// ── EVENTOS INPUT SUFIJO (2 dígitos) ──────────────
const inputSuffix = document.getElementById('input-suffix');

inputSuffix.addEventListener('input', () => {
  const val = inputSuffix.value.replace(/\D/g, '').slice(0, 2);
  inputSuffix.value = val;

  if (!val) {
    resetSplitEstado();
    setHint('Ingresa los 2 dígitos del pallet (' + importActivo + '.XX)', 'sup');
    ocultarResultados();
    return;
  }

  if (val.length === 2) {
    // Búsqueda automática al completar 2 dígitos
    const numCompleto = importActivo + '.' + val;
    buscarPallet(numCompleto);
  } else {
    setSplitEstado('');
    setHint('Ingresa los 2 dígitos del pallet (' + importActivo + '.' + val + '_)', 'active');
  }
});

inputSuffix.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && inputSuffix.value.replace(/\D/g,'').length === 2) {
    buscarPallet(importActivo + '.' + inputSuffix.value.replace(/\D/g,''));
  }
});

// ── EVENTOS INPUT NORMAL ───────────────────────────
const inputPallet = document.getElementById('input-pallet');

inputPallet.addEventListener('input', () => {
  const val = inputPallet.value.trim();
  if (!val) {
    clearDebounce();
    resetNormalEstado();
    setHint('Ingresa o escanea el número de pallet', '');
    ocultarResultados();
    return;
  }
  const formatoScanner = /^\d{3,6}\.\d{2}$/.test(val);
  clearDebounce();
  setHint('Escribiendo...', 'active');
  setNormalEstado('');

  if (formatoScanner) {
    buscarPallet(val);
  } else {
    debounceTimer = setTimeout(() => {
      const v = inputPallet.value.trim();
      if (v) buscarPallet(v);
    }, 1500);
  }
});

inputPallet.addEventListener('keydown', (e) => {
  if (e.key === 'Enter') {
    clearDebounce();
    const val = inputPallet.value.trim();
    if (val) buscarPallet(val);
  }
});

function clearDebounce() {
  if (debounceTimer) { clearTimeout(debounceTimer); debounceTimer = null; }
}

// ════════════════════════════════════════════════
//  BÚSQUEDA
// ════════════════════════════════════════════════
async function buscarPallet(num) {
  if (buscando) return;
  buscando = true;

  setSplitEstado('buscando');
  setNormalEstado('buscando');
  setStatusIcon('<span class="spinner"></span>');
  setHint('Buscando  ' + num + '...', 'active');
  ocultarResultados();

  try {
    const res  = await fetch(`${SCRIPT_URL}?action=getPalletByNum&num=${encodeURIComponent(num)}`);
    const data = await res.json();

    if (data.encontrado) {
      palletActual = data.pallet;

      document.getElementById('v-pallet').textContent = palletActual.nPallet;
      document.getElementById('v-ubic').textContent   = palletActual.ubicDestino || 'SIN UBICACIÓN';
      document.getElementById('v-sap').textContent    = palletActual.sap;
      document.getElementById('v-desc').textContent   = palletActual.descripcion;
      document.getElementById('v-qty').textContent    = palletActual.cantidad;

      document.getElementById('pallet-info').style.display = 'block';
      document.getElementById('action-btns').style.display  = 'grid';

      setSplitEstado('encontrado');
      setNormalEstado('encontrado');
      setStatusIcon('✅');
      setHint('Pallet encontrado — selecciona acción', 'ok');
    } else {
      setSplitEstado('error');
      setNormalEstado('error');
      setStatusIcon('❌');
      setHint(data.msg || 'Pallet no encontrado', 'err');
      showToast(data.msg || '❌ No encontrado', 'err');
    }
  } catch (e) {
    setSplitEstado('error');
    setNormalEstado('error');
    setStatusIcon('⚠️');
    setHint('Error de conexión — reintenta', 'err');
    showToast('⚠️ Error de conexión', 'err');
  } finally {
    buscando = false;
  }
}

// ════════════════════════════════════════════════
//  REGISTRO
// ════════════════════════════════════════════════
async function registrar(estado) {
  if (!palletActual || !opActual) return;
  const btns = document.querySelectorAll('.btn-act');
  btns.forEach(b => b.disabled = true);
  showToast(`Registrando ${estado}...`, '');

  const payload = {
    action:       'registrar', // Añadimos la acción al payload para el POST
    rowIndex:     palletActual.rowIndex,
    estado,
    grueroId:     opActual.id,
    grueroNombre: opActual.nombre,
    fecha:        new Date().toLocaleDateString('es-CL'),
    hora:         new Date().toLocaleTimeString('es-CL')
  };

  try {
    // En Apps Script, el POST a veces es más robusto enviando como texto plano o URLSearchParams
    const res  = await fetch(SCRIPT_URL, { 
      method:'POST', 
      body: JSON.stringify(payload) 
    });
    const data = await res.json();
    if (data.ok) {
      showToast('✅ REGISTRADO CON ÉXITO', 'ok');
      reset();
    } else {
      showToast('❌ ERROR AL GRABAR', 'err');
      btns.forEach(b => b.disabled = false);
    }
  } catch (e) {
    showToast('❌ ERROR DE RED', 'err');
    btns.forEach(b => b.disabled = false);
  }
}

// ════════════════════════════════════════════════
//  HELPERS
// ════════════════════════════════════════════════
function reset() {
  palletActual = null;
  document.querySelectorAll('.btn-act').forEach(b => b.disabled = false);
  ocultarResultados();

  if (importActivo) {
    // En modo importación: limpiar solo el sufijo
    document.getElementById('input-suffix').value = '';
    resetSplitEstado();
    setHint('Ingresa los 2 dígitos del pallet (' + importActivo + '.XX)', 'sup');
    setTimeout(() => document.getElementById('input-suffix').focus(), 100);
  } else {
    document.getElementById('input-pallet').value = '';
    resetNormalEstado();
    setHint('Ingresa o escanea el número de pallet', '');
    setTimeout(() => document.getElementById('input-pallet').focus(), 100);
  }
}

function ocultarResultados() {
  document.getElementById('pallet-info').style.display = 'none';
  document.getElementById('action-btns').style.display  = 'none';
}

function focusInput() {
  if (importActivo) {
    document.getElementById('input-suffix').focus();
  } else {
    document.getElementById('input-pallet').focus();
  }
}

function setHint(msg, cls) {
  const el = document.getElementById('search-hint');
  el.textContent = msg;
  el.className   = 'search-hint' + (cls ? ' ' + cls : '');
}

function setStatusIcon(html) {
  document.getElementById('status-icon-normal').innerHTML = html;
  document.getElementById('status-icon-split').innerHTML  = html;
}

function setSplitEstado(cls) {
  const w = document.getElementById('wrapper-split');
  w.className = 'split-input-wrapper on' + (cls ? ' ' + cls : '');
}
function resetSplitEstado() { setSplitEstado(''); }

function setNormalEstado(cls) {
  const inp = document.getElementById('input-pallet');
  inp.className = 'search-input' + (cls ? ' ' + cls : '');
}
function resetNormalEstado() { setNormalEstado(''); }

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('on'));
  document.getElementById(id).classList.add('on');
}

let toastTimer = null;
function showToast(msg, type) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className   = 'toast on' + (type ? ' ' + type : '');
  if (toastTimer) clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { t.className = 'toast'; }, 3000);
}
</script>
