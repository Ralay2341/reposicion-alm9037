<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LOGÍSTICA DASHBOARD - RepoSYSTEM</title>
    <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700&family=Barlow:wght@400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- Plugin para mostrar valores sobre las barras -->
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.0.0"></script>
    <style>
        :root {
            --bg: #0b0f18;
            --card: #131926;
            --linde-red: #e30613;
            --blue: #3b82f6;
            --green: #22c55e;
            --orange: #f97316;
            --txt: #e8eaf0;
            --txt-dim: #8896b0;
            --border: #1e2d45;
        }
        body {
            font-family: 'Barlow', sans-serif;
            background-color: var(--bg);
            color: var(--txt);
            margin: 0;
            padding: 0;
        }
        header {
            background: #090e1a;
            padding: 20px;
            text-align: center;
            border-bottom: 3px solid var(--linde-red);
        }
        header h1 {
            font-family: 'Barlow Condensed', sans-serif;
            margin: 0;
            letter-spacing: 2px;
            font-size: 24px;
        }
        header span { color: var(--linde-red); }
        
        .container {
            padding: 15px;
            max-width: 1100px;
            margin: 0 auto;
        }
        
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(340px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }
        
        .card {
            background: var(--card);
            border-radius: 12px;
            padding: 20px;
            border: 1px solid var(--border);
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        
        .card h3 {
            margin-top: 0;
            font-size: 15px;
            color: var(--txt-dim);
            text-transform: uppercase;
            letter-spacing: 1px;
            border-bottom: 1px solid var(--border);
            padding-bottom: 10px;
            margin-bottom: 20px;
        }

        .stats-summary {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 20px;
        }
        .stat-box {
            background: #1a2234;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
        }
        .stat-val {
            display: block;
            font-size: 22px;
            font-weight: bold;
            color: var(--linde-red);
        }
        .stat-label {
            font-size: 10px;
            color: var(--txt-dim);
            text-transform: uppercase;
        }

        .top-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }
        .top-item {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid #1e2d45;
            font-size: 12px;
        }
        .top-count {
            background: var(--linde-red);
            padding: 2px 8px;
            border-radius: 4px;
            font-weight: bold;
        }

        .btn-refresh {
            background: var(--linde-red);
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 50px;
            font-weight: bold;
            cursor: pointer;
            display: block;
            margin: 20px auto;
            text-transform: uppercase;
            transition: 0.3s;
        }

        footer {
            text-align: center;
            padding: 30px;
            font-size: 12px;
            color: var(--txt-dim);
        }
        footer strong { color: var(--linde-red); }

        @media (max-width: 600px) {
            .grid { grid-template-columns: 1fr; }
            .stats-summary { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<header>
    <h1>DASHBOARD <span>LOGÍSTICO</span></h1>
</header>

<div class="container">
    <div class="stats-summary">
        <div class="stat-box">
            <span id="totalTareas" class="stat-val">0</span>
            <span class="stat-label">Tareas Totales</span>
        </div>
        <div class="stat-box">
            <span id="totalRealizadas" class="stat-val">0</span>
            <span class="stat-label">Realizadas</span>
        </div>
        <div class="stat-box">
            <span id="promedioEquipo" class="stat-val">0</span>
            <span class="stat-label">Pallets/Hora Equipo</span>
        </div>
    </div>

    <button class="btn-refresh" onclick="cargarReporte()">Actualizar Reporte</button>

    <div class="grid">
        <!-- Gráfico de Avance -->
        <div class="card">
            <h3>Estado de Reposición (%)</h3>
            <canvas id="chartEstados"></canvas>
        </div>

        <!-- Gráfico de Pallets por Hora Individual -->
        <div class="card">
            <h3>Rendimiento Individual (Pallets/Hora)</h3>
            <canvas id="chartIndiv"></canvas>
        </div>

        <!-- Gráfico de Pallets por Hora Grupo -->
        <div class="card">
            <h3>Movimiento por Hora (Equipo Completo)</h3>
            <canvas id="chartGrupo"></canvas>
        </div>

        <!-- Ranking de Productos -->
        <div class="card">
            <h3>Top Productos más Movidos</h3>
            <div id="listaProductos" class="top-list"></div>
        </div>
    </div>
</div>

<footer>
    Diseñado por: <strong>Raul Layseca</strong>
</footer>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwTU_4vSFf0MOoQrfceGnYTkkIxLd2ewbUWR9rIOHoZ_nXfeWN8Uti5Nu-Za3sEDLlpRQ/exec"; // REEMPLAZAR

    Chart.register(ChartDataLabels);
    let charts = {};

    window.onload = cargarReporte;

    async function cargarReporte() {
        try {
            const resp = await fetch(`${SCRIPT_URL}?action=getReporteDatos`);
            const data = await resp.json();
            if (data.error) return alert("Error: " + data.error);
            actualizarDashboard(data);
        } catch (err) { alert("Error de conexión"); }
    }

    function actualizarDashboard(data) {
        document.getElementById('totalTareas').innerText = data.totalTareas;
        document.getElementById('totalRealizadas').innerText = data.porEstado['REALIZADO'] || 0;
        
        // Calcular promedio equipo
        const valsInd = Object.values(data.palletsHoraInd);
        const prom = valsInd.length ? (valsInd.reduce((a,b)=>a+b,0) / valsInd.length).toFixed(2) : 0;
        document.getElementById('promedioEquipo').innerText = prom;

        // 1. Gráfico Estados
        renderChart('chartEstados', 'pie', Object.keys(data.porEstado), Object.values(data.porEstado), ['#22c55e', '#ef4444', '#f97316', '#3b82f6']);

        // 2. Gráfico Individual (Pallets/Hora)
        renderChart('chartIndiv', 'bar', Object.keys(data.palletsHoraInd), Object.values(data.palletsHoraInd), '#e30613', 'Pallets/Hora');

        // 3. Gráfico Grupo (Por Hora del día)
        const horasLabels = Object.keys(data.porHoraGrupo).map(h => h + ":00");
        renderChart('chartGrupo', 'line', horasLabels, Object.values(data.porHoraGrupo), '#3b82f6', 'Pallets Totales');

        // 4. Ranking
        const lista = document.getElementById('listaProductos');
        lista.innerHTML = "";
        Object.entries(data.topProductos).sort((a,b)=>b[1]-a[1]).slice(0,5).forEach(([name, count]) => {
            lista.innerHTML += `<div class="top-item"><span>${name}</span><span class="top-count">${count}</span></div>`;
        });
    }

    function renderChart(id, type, labels, data, colors, labelName = '') {
        const ctx = document.getElementById(id).getContext('2d');
        if (charts[id]) charts[id].destroy();
        charts[id] = new Chart(ctx, {
            type: type,
            data: {
                labels: labels,
                datasets: [{
                    label: labelName,
                    data: data,
                    backgroundColor: colors,
                    borderColor: type === 'line' ? colors : 'transparent',
                    tension: 0.3
                }]
            },
            options: {
                plugins: {
                    legend: { display: type === 'pie' || type === 'doughnut', labels: { color: '#8896b0' } },
                    datalabels: {
                        color: '#fff',
                        font: { weight: 'bold' },
                        formatter: (val) => val > 0 ? val : ''
                    }
                },
                scales: type === 'bar' || type === 'line' ? {
                    y: { grid: { color: '#1e2d45' }, ticks: { color: '#8896b0' } },
                    x: { ticks: { color: '#8896b0' } }
                } : {}
            }
        });
    }
</script>
</body>
</html>
