<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ALM9037 · Conolidado - Propiedad de: Raul Layseca Beas</title>
  <style>
    :root {
      --bg:#0f172a; --surface:#1e293b; --surface2:#273449; --border:#334155;
      --accent:#f97316; --accent2:#fb923c; --ok:#22c55e; --warn:#eab308;
      --text:#f1f5f9; --muted:#94a3b8;
      --mono:'Courier New',monospace; --sans:'Segoe UI',system-ui,sans-serif;
    }
    *{box-sizing:border-box;margin:0;padding:0;}
    body{background:var(--bg);color:var(--text);font-family:var(--sans);min-height:100vh;}

    header{background:var(--surface);border-bottom:2px solid var(--accent);padding:12px 18px;
      display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
    .logo{display:flex;align-items:center;gap:10px;}
    .badge{background:var(--accent);color:#000;font-weight:800;font-size:11px;
      padding:3px 8px;border-radius:4px;letter-spacing:1px;}
    header h1{font-size:16px;font-weight:700;}
    .hdr-right{display:flex;align-items:center;gap:10px;}
    #btnVolver{display:none;background:var(--border);border:none;color:var(--text);
      padding:7px 13px;border-radius:6px;cursor:pointer;font-size:13px;font-family:var(--sans);}
    #btnVolver:hover{background:var(--surface2);}
    #btnRefresh{background:transparent;border:1px solid var(--border);color:var(--muted);
      padding:6px 10px;border-radius:6px;cursor:pointer;font-size:13px;font-family:var(--sans);}
    #btnRefresh:hover{border-color:var(--accent);color:var(--accent);}
    #statusDot{width:9px;height:9px;border-radius:50%;background:var(--warn);}
    #statusDot.ok{background:var(--ok);}

    #toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);
      background:var(--surface);border:1px solid var(--accent);color:var(--text);
      padding:11px 20px;border-radius:10px;font-size:13px;z-index:999;
      transition:transform .3s ease;pointer-events:none;white-space:nowrap;}
    #toast.show{transform:translateX(-50%) translateY(0);}

    #loadingOverlay{position:fixed;inset:0;background:rgba(15,23,42,.88);
      display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:200;gap:14px;}
    .spinner{width:42px;height:42px;border:4px solid var(--border);border-top-color:var(--accent);
      border-radius:50%;animation:spin .7s linear infinite;}
    @keyframes spin{to{transform:rotate(360deg);}}
    #loadingMsg{font-size:14px;color:var(--muted);}

    #modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:300;
      align-items:center;justify-content:center;}
    #modal.open{display:flex;}
    .modal-box{background:var(--surface);border:1px solid var(--warn);border-radius:14px;
      padding:26px 22px;width:310px;max-width:92vw;}
    .modal-box h3{font-size:15px;margin-bottom:5px;}
    .modal-box p{font-size:12px;color:var(--muted);margin-bottom:16px;line-height:1.5;}
    .modal-box input{width:100%;background:var(--bg);border:1px solid var(--border);
      border-radius:8px;color:var(--text);font-size:20px;font-family:var(--mono);
      padding:10px 13px;outline:none;margin-bottom:16px;}
    .modal-box input:focus{border-color:var(--warn);}
    .modal-actions{display:flex;gap:10px;}
    .modal-actions button{flex:1;padding:10px;border:none;border-radius:8px;
      font-size:14px;font-weight:700;cursor:pointer;font-family:var(--sans);}
    #btnModalOk{background:var(--warn);color:#000;}
    #btnModalCancel{background:var(--border);color:var(--text);}

    #screenOps{max-width:580px;margin:0 auto;padding:32px 18px;}
    #screenOps h2{font-size:20px;font-weight:700;color:var(--accent);margin-bottom:6px;}
    #screenOps p{color:var(--muted);font-size:13px;margin-bottom:24px;}
    .ops-grid{display:grid;grid-template-columns:1fr 1fr;gap:11px;}
    .op-btn{background:var(--surface);border:1px solid var(--border);border-radius:12px;
      padding:18px 14px;cursor:pointer;display:flex;flex-direction:column;
      align-items:center;gap:9px;transition:border-color .2s,transform .15s;
      color:var(--text);font-family:var(--sans);}
    .op-btn:hover{border-color:var(--accent);transform:translateY(-2px);}
    .avatar{width:50px;height:50px;border-radius:50%;background:var(--accent);color:#000;
      font-size:18px;font-weight:900;display:flex;align-items:center;justify-content:center;}
    .op-btn.apoyo .avatar{background:var(--border);color:var(--muted);}
    .op-btn .op-name{font-size:12px;font-weight:600;text-align:center;line-height:1.3;}
    .op-counter{font-size:11px;color:var(--muted);}
    .op-counter b{color:var(--accent2);}

    #screenTareas{display:none;padding:18px;}
    .tareas-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
    .tareas-header h2{font-size:17px;font-weight:700;}
    .tareas-header h2 span{color:var(--accent);}
    .progress-wrap{background:var(--border);border-radius:6px;height:6px;overflow:hidden;margin-bottom:4px;}
    .progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));
      border-radius:6px;transition:width .4s ease;}
    .progress-label{font-size:11px;color:var(--muted);margin-bottom:16px;}
    .filter-tabs{display:flex;gap:7px;margin-bottom:14px;flex-wrap:wrap;}
    .filter-tabs button{background:var(--surface);border:1px solid var(--border);color:var(--muted);
      padding:5px 13px;border-radius:20px;cursor:pointer;font-size:12px;font-family:var(--sans);}
    .filter-tabs button.active{border-color:var(--accent);color:var(--accent);
      background:rgba(249,115,22,.1);}

    .cards-list{display:flex;flex-direction:column;gap:11px;}
    .task-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:15px;}
    .task-card.done{border-color:var(--ok);opacity:.6;}
    .task-card.pend-state{border-color:var(--warn);}
    .card-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px;}
    .card-sec{font-family:var(--mono);font-size:13px;font-weight:700;color:var(--accent);}
    .card-fecha{font-size:11px;color:var(--muted);}
    .card-origin{background:rgba(249,115,22,.1);border:1px solid rgba(249,115,22,.22);
      border-radius:5px;padding:3px 9px;font-family:var(--mono);font-size:11px;
      color:var(--accent2);display:inline-block;margin-bottom:7px;}
    .card-desc{font-size:14px;font-weight:600;margin-bottom:7px;line-height:1.4;}
    .card-meta{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:12px;}
    .meta-pill{background:var(--surface2);border-radius:5px;padding:3px 8px;font-size:11px;color:var(--muted);}
    .meta-pill b{color:var(--text);font-family:var(--mono);}
    .card-actions{display:flex;gap:9px;}
    .btn-realizado,.btn-pendiente{flex:1;border:none;border-radius:8px;padding:10px 6px;
      font-size:13px;font-weight:700;cursor:pointer;font-family:var(--sans);
      display:flex;align-items:center;justify-content:center;gap:5px;transition:opacity .2s;}
    .btn-realizado{background:var(--ok);color:#000;}
    .btn-pendiente{background:var(--warn);color:#000;}
    .btn-realizado:hover,.btn-pendiente:hover{opacity:.85;}
    .btn-realizado:disabled,.btn-pendiente:disabled{opacity:.3;cursor:not-allowed;}
    .card-status{margin-top:9px;display:flex;align-items:center;gap:7px;flex-wrap:wrap;}
    .chip-done{background:rgba(34,197,94,.15);border:1px solid var(--ok);color:var(--ok);
      border-radius:5px;padding:2px 8px;font-size:11px;font-weight:700;}
    .chip-pend{background:rgba(234,179,8,.15);border:1px solid var(--warn);color:var(--warn);
      border-radius:5px;padding:2px 8px;font-size:11px;font-weight:700;}
    .chip-info{font-size:11px;color:var(--muted);}
    .empty-msg{text-align:center;color:var(--muted);padding:48px 20px;font-size:14px;}
    .empty-msg span{font-size:38px;display:block;margin-bottom:10px;}

    .cant-box{
      background:rgba(249,115,22,.12);
      border:1px solid rgba(249,115,22,.35);
      border-radius:8px;
      padding:10px 14px;
      margin-bottom:12px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
    }
    .cant-label{font-size:10px;font-weight:700;color:var(--accent);letter-spacing:.8px;text-transform:uppercase;}
    .cant-valor{font-family:var(--mono);font-size:28px;font-weight:900;color:var(--text);line-height:1;}

    @media(max-width:420px){
      .card-actions{flex-direction:column;}
    }
  </style>
</head>
<body>

<div id="loadingOverlay">
  <div class="spinner"></div>
  <div id="loadingMsg">Conectando con Google Sheets…</div>
</div>

<header>
  <div class="logo">
    <span class="badge">ALM9037</span>
    <h1>Pick System</h1>
  </div>
  <div class="hdr-right">
    <button id="btnRefresh" onclick="recargar()">⟳ Sync</button>
    <button id="btnVolver"  onclick="volverOps()">← Volver</button>
    <div id="statusDot"></div>
  </div>
</header>

<div id="modal">
  <div class="modal-box">
    <h3>⚠️ Marcar como Pendiente</h3>
    <p id="modalDesc">Ingresa la cantidad pendiente.</p>
    <input type="number" id="modalCantidad" placeholder="Ej: 5" min="0"/>
    <div class="modal-actions">
      <button id="btnModalCancel" onclick="cerrarModal()">Cancelar</button>
      <button id="btnModalOk"     onclick="confirmarPendiente()">Confirmar</button>
    </div>
  </div>
</div>

<div id="screenOps">
  <h2>Selecciona tu Nombre</h2>
  <p>Elige tu operador para ver y gestionar tus tareas.</p>
  <div class="ops-grid" id="opsGrid"></div>
</div>

<div id="screenTareas">
  <div class="tareas-header">
    <h2>Tareas · <span id="opNombre"></span></h2>
    <div id="contadorLabel" style="font-size:12px;color:var(--muted);"></div>
  </div>
  <div class="progress-wrap"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
  <div class="progress-label" id="progressLabel"></div>
  <div class="filter-tabs">
    <button class="active" data-f="todas"     onclick="filtrar(this)">Todas</button>
    <button               data-f="en-espera"  onclick="filtrar(this)">En espera</button>
    <button               data-f="pendientes" onclick="filtrar(this)">Pendientes</button>
    <button               data-f="realizadas" onclick="filtrar(this)">Realizadas</button>
  </div>
  <div class="cards-list" id="cardsList"></div>
</div>

<div id="toast"></div>

<script>
const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxnEv94Nt1rhn2KOQBuUw3HSZ1HCDviQQSuwa623cTwTbwLX_KSKuQVy7DmgNAbjN-tSA/exec';

const OPERATORS = [
  {name:'Diego Nahuelcheo',   ini:'DN'},
  {name:'Francisco Vigueras', ini:'FV'},
  {name:'Gonzalo Diaz',       ini:'GD'},
  {name:'Jorge Gonzalez',     ini:'JG'},
  {name:'Jim San Martin',     ini:'JS'},
  {name:'Apoyo1',             ini:'A1', apoyo:true},
  {name:'Apoyo2',             ini:'A2', apoyo:true},
];

// índices 0-based: A=0 B=1 C=2 D=3 E=4 F=5 G=6 H=7 I=8 J=9 K=10 L=11 M=12 N=13
// Columna K(10)=Nombre operador quien realizó, L(11)=Fecha, M(12)=Hora, N(13)=Cant.Pendiente
// El "Estado" se deduce: si K tiene nombre → Realizado; si N tiene valor → Pendiente
const CI = {
  FECHA:0, OP:1, SEC:2, DESDE:3, SAP:4, DESC:5, CB:6, CANT:7,
  FORMATO:8, DESTINO:9, ESTADO:10, NOMBRE_K:10, FECHA_L:11, HORA_M:12, CANT_N:13
};

let allRows      = [];
let currentOp    = null;
let currentFilter= 'todas';
let pendTarget   = null;

const $= id => document.getElementById(id);
const hoy  = () => new Date().toLocaleDateString('es-CL');
const ahora= () => new Date().toLocaleTimeString('es-CL',{hour:'2-digit',minute:'2-digit',second:'2-digit'});

function toast(msg, dur=2800){
  const t=$('toast'); t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), dur);
}
function setLoading(show, msg=''){
  $('loadingOverlay').style.display = show ? 'flex' : 'none';
  if(msg) $('loadingMsg').textContent = msg;
}
function setStatus(ok){
  $('statusDot').classList.toggle('ok', ok);
}

// ── LECTURA vía GET ──────────────────────────────────────────────────
async function fetchData(){
  const url  = APPS_SCRIPT_URL + '?action=read&v=' + Date.now();
  const resp = await fetch(url);
  if(!resp.ok) throw new Error('HTTP ' + resp.status);
  const json = await resp.json();
  if(!json.ok) throw new Error(json.msg || 'Error en Apps Script');
  // fila 0 = encabezados → saltamos, rowNum empieza en 2
  allRows = json.data.slice(1).map((vals, i) => ({
    rowNum: i + 2,
    vals: vals.map(v => (v === null || v === undefined) ? '' : String(v))
  }));
}

// ── ESCRITURA vía GET (evita CORS de OPTIONS preflight) ──────────────
async function writeRow(rowNum, updates){
  // updates: {K:'valor', L:'valor', N:'valor'...}
  const params = new URLSearchParams();
  params.set('action', 'write');
  params.set('row', String(rowNum));
  for(const col in updates){
    params.set(col, String(updates[col]));
  }
  const url  = APPS_SCRIPT_URL + '?' + params.toString();
  const resp = await fetch(url);
  if(!resp.ok) throw new Error('HTTP ' + resp.status);
  const json = await resp.json();
  if(!json.ok) throw new Error(json.msg || 'Error al escribir');
}

// ── OPERADORES ───────────────────────────────────────────────────────
function renderOps(){
  const grid = $('opsGrid');
  grid.innerHTML = '';
  OPERATORS.forEach(op => {
    const mis   = allRows.filter(r => r.vals[CI.OP].trim().toLowerCase() === op.name.toLowerCase());
    const total = mis.length;
    const done  = mis.filter(r => r.vals[CI.NOMBRE_K].trim() !== '').length;

    const btn = document.createElement('button');
    btn.className = 'op-btn' + (op.apoyo ? ' apoyo' : '');
    btn.innerHTML = `
      <div class="avatar">${op.ini}</div>
      <span class="op-name">${op.name}</span>
      <span class="op-counter">
        ${total > 0 ? `<b>${done}</b>/${total} realizadas` : 'Sin tareas'}
      </span>`;
    btn.onclick = () => abrirOp(op.name);
    grid.appendChild(btn);
  });
}

function abrirOp(nombre){
  currentOp     = nombre;
  currentFilter = 'todas';
  document.querySelectorAll('.filter-tabs button').forEach(b =>
    b.classList.toggle('active', b.dataset.f === 'todas')
  );
  $('screenOps').style.display    = 'none';
  $('screenTareas').style.display = 'block';
  $('opNombre').textContent       = nombre;
  $('btnVolver').style.display    = 'inline-block';
  renderTareas();
}

function volverOps(){
  $('screenOps').style.display    = 'block';
  $('screenTareas').style.display = 'none';
  $('btnVolver').style.display    = 'none';
  currentOp = null;
  renderOps();
}

// ── FILTROS ──────────────────────────────────────────────────────────
function filtrar(btn){
  document.querySelectorAll('.filter-tabs button').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentFilter = btn.dataset.f;
  renderTareas();
}

// ── TAREAS ───────────────────────────────────────────────────────────
function renderTareas(){
  const mis   = allRows.filter(r => r.vals[CI.OP].trim().toLowerCase() === currentOp.toLowerCase());
  const total = mis.length;
  const done  = mis.filter(r => r.vals[CI.NOMBRE_K].trim() !== '').length;
  const pct   = total ? Math.round(done / total * 100) : 0;

  $('progressFill').style.width  = pct + '%';
  $('progressLabel').textContent = `${done} de ${total} tareas realizadas (${pct}%)`;
  $('contadorLabel').textContent = `${total - done} por completar`;

  let visible = mis;
  if(currentFilter === 'realizadas')
    visible = mis.filter(r => r.vals[CI.NOMBRE_K].trim() !== '');
  else if(currentFilter === 'pendientes')
    visible = mis.filter(r => r.vals[CI.CANT_N] !== '' && r.vals[CI.NOMBRE_K].trim() === '');
  else if(currentFilter === 'en-espera')
    visible = mis.filter(r => r.vals[CI.NOMBRE_K].trim() === '' && r.vals[CI.CANT_N] === '');

  const list = $('cardsList');
  list.innerHTML = '';

  if(!visible.length){
    list.innerHTML = '<div class="empty-msg"><span>📭</span>No hay tareas en esta categoría.</div>';
    return;
  }

  visible.forEach(row => {
    const v      = row.vals;
    // Realizado: columna K tiene nombre (operador quien ejecutó)
    // Pendiente: columna N tiene cantidad Y columna K vacía
    const isDone = v[CI.NOMBRE_K].trim() !== '';
    const cantN  = v[CI.CANT_N];
    const isPend = cantN !== '' && !isDone;

    let statusHtml = '';
    if(isDone){
      statusHtml = `<div class="card-status">
        <span class="chip-done">✔ REALIZADO</span>
        <span class="chip-info">${v[CI.NOMBRE_K]} · ${v[CI.FECHA_L]} ${v[CI.HORA_M]}</span>
      </div>`;
    } else if(isPend){
      statusHtml = `<div class="card-status">
        <span class="chip-pend">⏳ PENDIENTE</span>
        <span class="chip-info">Cant. pendiente: ${cantN}</span>
      </div>`;
    }

    const card = document.createElement('div');
    card.className = 'task-card' + (isDone ? ' done' : '') + (isPend ? ' pend-state' : '');
    card.innerHTML = `
      <div class="card-top">
        <span class="card-sec">SEC #${v[CI.SEC]||'—'}</span>
        <span class="card-fecha">${String(v[CI.FECHA]).slice(0,10)||''}</span>
      </div>
      <div class="card-origin">📍 ${v[CI.DESDE]||'—'}</div>
      <div class="card-desc">${v[CI.DESC]||'—'}</div>
      <div class="card-meta">
        <div class="meta-pill">SAP <b>${v[CI.SAP]||'—'}</b></div>
        <div class="meta-pill">Cód.Barra <b>${v[CI.CB]||'—'}</b></div>
        <div class="meta-pill">Formato <b>${v[CI.FORMATO]||'—'}</b></div>
      </div>
      <div class="cant-box">
        <span class="cant-label">CANTIDAD SOLICITADA</span>
        <span class="cant-valor">${v[CI.CANT]||'—'}</span>
      </div>
      <div class="card-actions">
        <button class="btn-realizado" ${isDone?'disabled':''} onclick="marcarRealizado(${row.rowNum},this)">
          ✔ Realizado
        </button>
        <button class="btn-pendiente" ${isDone?'disabled':''} onclick="abrirModal(${row.rowNum},'${(v[CI.DESC]||'').replace(/'/g,"\\'").replace(/\n/g,' ')}')">
          ⏳ Pendiente
        </button>
      </div>
      ${statusHtml}`;
    list.appendChild(card);
  });
}

// ── REALIZADO ────────────────────────────────────────────────────────
async function marcarRealizado(rowNum, btn){
  btn.disabled = true;
  btn.closest('.card-actions').querySelector('.btn-pendiente').disabled = true;
  setLoading(true, 'Guardando en Google Sheets…');

  const nombre = currentOp;
  const fecha  = hoy();
  const hora   = ahora();

  const row = allRows.find(r => r.rowNum === rowNum);
  if(row){
    row.vals[CI.NOMBRE_K] = nombre;
    row.vals[CI.FECHA_L]  = fecha;
    row.vals[CI.HORA_M]   = hora;
    row.vals[CI.ESTADO]   = 'Realizado';
  }

  try{
    await writeRow(rowNum, {K: nombre, L: fecha, M: hora});
    toast('✔ REALIZADO guardado correctamente');
  } catch(e){
    toast('❌ Error al guardar: ' + e.message, 4000);
  }
  setLoading(false);
  renderTareas();
}

// ── PENDIENTE ────────────────────────────────────────────────────────
function abrirModal(rowNum, desc){
  pendTarget = {rowNum};
  $('modalDesc').textContent = desc ? `Ítem: ${desc}` : 'Ingresa la cantidad pendiente.';
  $('modalCantidad').value   = '';
  $('modal').classList.add('open');
  setTimeout(() => $('modalCantidad').focus(), 100);
}
function cerrarModal(){
  $('modal').classList.remove('open');
  pendTarget = null;
}
async function confirmarPendiente(){
  const cant = $('modalCantidad').value.trim();
  if(!cant || isNaN(cant)){ toast('⚠️ Ingresa una cantidad válida'); return; }
  cerrarModal();
  const {rowNum} = pendTarget;
  setLoading(true, 'Guardando en Google Sheets…');

  const row = allRows.find(r => r.rowNum === rowNum);
  if(row) row.vals[CI.CANT_N] = cant;

  try{
    await writeRow(rowNum, {N: cant});
    toast('⏳ Cantidad pendiente guardada: ' + cant);
  } catch(e){
    toast('❌ Error al guardar: ' + e.message, 4000);
  }
  setLoading(false);
  renderTareas();
}

// ── RECARGAR ─────────────────────────────────────────────────────────
async function recargar(){
  setLoading(true, 'Actualizando datos…');
  try{
    await fetchData();
    setStatus(true);
    toast('✔ Datos actualizados');
    if(currentOp) renderTareas(); else renderOps();
  } catch(e){
    setStatus(false);
    toast('❌ ' + e.message, 4000);
  }
  setLoading(false);
}

// ── INIT ─────────────────────────────────────────────────────────────
(async () => {
  setLoading(true, 'Cargando datos del warehouse…');
  try{
    await fetchData();
    setStatus(true);
    toast('✔ Datos cargados');
  } catch(e){
    setStatus(false);
    toast('❌ ' + e.message, 4000);
  }
  renderOps();
  setLoading(false);
  // auto-refresh cada 2 minutos
  setInterval(async () => {
    try{
      await fetchData();
      setStatus(true);
      if(currentOp) renderTareas(); else renderOps();
    } catch{}
  }, 120000);
})();
</script>
